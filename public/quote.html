<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>報價單｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
let clients=[],filtered=[],items=[];
function fillCustomer(){const c=clients.find(x=>String(x.id)===String(customerSelect.value));if(!c)return;customerTaxId.value=c.tax_id||'';contactPerson.value=c.contact_person||'';contactPhone.value=c.phone||'';contactJobTitle.value=c.job_title||'';customerAddress.value=c.address||'';renderDoc()}
function renderCustomerSelect(list){customerSelect.innerHTML='<option value="">請選擇客戶</option>'+list.map(c=>`<option value="${c.id}">${c.client_name}</option>`).join('');const preset=qs('clientId');if(preset&&list.some(c=>String(c.id)===String(preset))){customerSelect.value=preset;fillCustomer()}}
function filterCustomers(){const k=customerSearch.value.trim().toLowerCase();filtered=clients.filter(c=>(c.client_name||'').toLowerCase().includes(k)||!k);renderCustomerSelect(filtered)}
function addItem(){items.push({desc:'',qty:'',price:''});renderItems();renderDoc()}
function removeItem(i){items.splice(i,1);renderItems();renderDoc()}
function updateItem(i,k,v){items[i][k]=v;renderDoc()}
function renderItems(){quoteItems.innerHTML=items.length?items.map((r,i)=>`<div class="quote-item-card"><div class="toolbar" style="justify-content:space-between;align-items:center;"><strong>項目 ${i+1}</strong><button class="danger" onclick="removeItem(${i})">刪除</button></div><label>估價事項</label><textarea oninput="updateItem(${i},'desc',this.value)">${r.desc||''}</textarea><div class="row"><div><label>數量</label><input value="${r.qty||''}" oninput="updateItem(${i},'qty',this.value)"></div><div><label>單價</label><input value="${r.price||''}" oninput="updateItem(${i},'price',this.value)"></div></div></div>`).join(''):'<div class="muted">尚未新增項目，請按「＋新增項目」。</div>'}
function summary(){const opt=customerSelect.options[customerSelect.selectedIndex];const customer=opt&&opt.value?opt.text:'未選擇客戶';let subtotal=0;items.forEach(x=>subtotal+=(parseFloat(x.qty)||0)*(parseFloat(x.price)||0));const total=subtotal+Math.round(subtotal*0.05);return `【${COMPANY.name} 工程報價單】\n單號：${docNo.value}\n客戶：${customer}\n工程：${projectName.value}\n合計：NT$ ${money(total)}`}
function renderDoc(){let subtotal=0;const rows=items.map((r,i)=>{const qty=parseFloat(r.qty)||0,price=parseFloat(r.price)||0,total=qty*price;subtotal+=total;return `<tr><td>${i+1}</td><td class="col-desc">${nl2br(r.desc)}</td><td class="col-qty">${qty||''}</td><td class="col-price">${price?'NT$ '+money(price):''}</td><td class="col-total">${total?'NT$ '+money(total):''}</td></tr>`}).join('');const tax=Math.round(subtotal*0.05),total=subtotal+tax;const opt=customerSelect.options[customerSelect.selectedIndex];const customer=opt&&opt.value?opt.text:'＿＿＿＿';preview.innerHTML=`<div class="doc-head"><div><h2>${COMPANY.name}</h2><div class="doc-sub">${COMPANY.tag}<br>電話：${COMPANY.phone}<br>地址：${COMPANY.address}</div></div><div class="doc-sub" style="text-align:right;min-width:240px;"><strong style="font-size:20px;color:#111827;">工程報價單</strong><br><br>文件編號：${docNo.value||'＿＿＿＿'}<br>日期：${docDate.value||'＿＿＿＿'}<br>客戶：${customer}<br>客戶統編：${customerTaxId.value||'＿＿＿＿＿＿＿＿'}<br>聯絡人：${contactPerson.value||'＿＿＿＿'}<br>電話：${contactPhone.value||'＿＿＿＿'}</div></div><div class="block"><h3>工程名稱</h3><p>${projectName.value||'＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿'}</p></div><div class="block"><h3>客戶資訊</h3><p>通訊地址：${nl2br(customerAddress.value||'＿＿＿＿＿＿＿＿＿＿＿＿')}<br>職位：${contactJobTitle.value||'＿＿＿＿'}</p></div><div class="block"><h3>工程內容與費用</h3><table class="table"><thead><tr><th style="width:60px;">項次</th><th class="col-desc">估價事項</th><th class="col-qty">數量</th><th class="col-price">單價</th><th class="col-total">小計</th></tr></thead><tbody>${rows||'<tr><td colspan="5" class="muted">尚未新增報價項目</td></tr>'}</tbody></table><p style="text-align:right;margin-top:12px;line-height:1.9;">小計：NT$ ${money(subtotal)}<br>營業稅（5%）：NT$ ${money(tax)}<br><strong style="font-size:18px;">合計：NT$ ${money(total)}</strong></p></div><div class="block"><h3>施工 / 查修說明</h3><p>${nl2br(quoteDesc.value)||'&nbsp;'}</p></div><div class="block"><h3>報價條款與備註</h3><ol>${splitLines(quoteTerms.value).map(x=>`<li>${x.replace(/^\d+\./,'').trim()}</li>`).join('')}</ol></div>`}
async function saveDoc(){const p={quote_no:docNo.value,quote_date:docDate.value,client_id:customerSelect.value||null,project_name:projectName.value||'',quote_desc:quoteDesc.value||'',quote_terms:quoteTerms.value||'',items:items.map((x,i)=>({item_order:i+1,item_desc:x.desc,qty:Number(x.qty||0),unit_price:Number(x.price||0)}))};if(!p.client_id){alert('請先選擇客戶。');return}if(!p.project_name){alert('請先輸入工程名稱。');return}if(docId.value)await API.updateQuote(docId.value,p);else await API.createQuote(p);alert('報價已存檔')}
async function sendPdf(){if(!sendToMail.value.trim()){alert('請輸入收件 Email');return}const res=await API.sendPdfMail({documentType:'quote',to:sendToMail.value.trim(),subject:'工程報價單 '+docNo.value,memo:sendMemo.value||'',payload:{company:COMPANY,header:{docNo:docNo.value,docDate:docDate.value,customerName:customerSelect.options[customerSelect.selectedIndex]?.text||'',customerTaxId:customerTaxId.value,contactPerson:contactPerson.value,contactPhone:contactPhone.value,projectName:projectName.value,customerAddress:customerAddress.value,contactJobTitle:contactJobTitle.value},body:{quoteDesc:quoteDesc.value,quoteTerms:quoteTerms.value,items}}});alert(res.ok?'PDF 郵件已送出':(res.error||'寄送失敗'))}
document.getElementById('app').innerHTML=shell('新增報價單',`<div class="split"><div class="form-panel"><h2 style="margin-top:0;">報價單表單 <span class="badge" id="mode">新增</span></h2><input type="hidden" id="docId"><div class="info-box">${COMPANY.name}<br>${COMPANY.tag}<br>電話：${COMPANY.phone}<br>地址：${COMPANY.address}</div><div class="row"><div><label>文件編號</label><input id="docNo" readonly></div><div><label>日期</label><input id="docDate" placeholder="例如：2026/03/29"></div></div><label>客戶搜尋</label><input id="customerSearch"><label>客戶名稱（下拉選單）</label><select id="customerSelect"></select><div class="row"><div><label>客戶統編</label><input id="customerTaxId" readonly></div><div><label>聯絡人</label><input id="contactPerson"></div></div><div class="row"><div><label>聯絡電話</label><input id="contactPhone"></div><div><label>職位</label><input id="contactJobTitle"></div></div><label>通訊地址</label><textarea id="customerAddress"></textarea><label>工程名稱</label><input id="projectName"><div class="toolbar"><button id="addItemBtn">＋新增項目</button><button class="secondary" onclick="window.print()">一鍵匯出 PDF</button><button class="light" id="sendPdfBtn">附 PDF 寄 MAIL</button><button class="light" id="lineBtn">LINE 摘要</button><button class="light" id="mailBtn">MAIL 摘要</button></div><div id="quoteItems"></div><label>施工 / 查修說明</label><textarea id="quoteDesc"></textarea><label>報價條款</label><textarea id="quoteTerms">1. 本報價單有效期限為15日。\n2. 本公司依稅法規定，將全額開立統一發票。\n3. 本工程完工後，客戶應於一個月內完成驗收；逾期未提出異議者，視同驗收完成。\n4. 付款方式：本案於完工驗收後，請客戶於次月5日前完成撥款。\n5. 本估價內容以現場現況施工為準，如有新增或變更項目，費用另行報價。</textarea><div class="row"><div><label>寄送 Email</label><input id="sendToMail"></div><div><label>寄件備註</label><input id="sendMemo"></div></div><div class="toolbar"><button id="saveBtn">存檔</button></div></div><div class="preview-panel" id="preview"></div></div>`);
async function init(){clients=await API.getClients();filtered=[...clients];renderCustomerSelect(clients);const next=await API.nextNo('quote');docNo.value=next.doc_no;addItem();['docNo','docDate','customerTaxId','contactPerson','contactPhone','contactJobTitle','customerAddress','projectName','quoteDesc','quoteTerms'].forEach(id=>document.getElementById(id).addEventListener('input',renderDoc));customerSearch.addEventListener('input',filterCustomers);customerSelect.addEventListener('change',fillCustomer);addItemBtn.addEventListener('click',addItem);saveBtn.addEventListener('click',saveDoc);lineBtn.addEventListener('click',()=>shareToLine(summary()));mailBtn.addEventListener('click',()=>shareToMail('報價單 '+docNo.value,summary()));sendPdfBtn.addEventListener('click',sendPdf);const id=qs('id');if(id){mode.textContent='修改';docId.value=id;const d=await API.getQuote(id);docNo.value=d.quote_no||'';docDate.value=d.quote_date||'';projectName.value=d.project_name||'';quoteDesc.value=d.quote_desc||'';quoteTerms.value=d.quote_terms||'';customerSelect.value=d.client_id?String(d.client_id):'';fillCustomer();items=(d.items||[]).map(x=>({desc:x.item_desc||'',qty:x.qty||'',price:x.unit_price||''}));renderItems()}renderDoc()}init().catch(err=>alert(err.message));
</script></body></html>
