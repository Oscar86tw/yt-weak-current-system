<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>報價單｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/forms-template.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML = shell('資料建立 / 報價單 / 新增', `<div class="form-wrap">
  <div class="form-topbar">
    <div class="form-brand">
      <h1>昱拓弱電有限公司｜V3.9 完整整合版</h1>
      <p>資料建立 / 報價單 / 新增</p>
    </div>
    <div class="form-actions no-print" id="topActions"></div>
  </div>
  <div class="form-grid">
    <div class="form-panel" id="leftPanel"></div>
    <div class="form-preview" id="preview"></div>
  </div>
</div>`);

const state = { id: qs('id') || '', items: [] };
let clients = [], categories = [], equipment = [], units = [];

function money(v){ return Number(v||0).toLocaleString('zh-TW'); }
function today(){ return new Date().toISOString().slice(0,10); }
function linesToOl(text=''){ return text.split(/\n+/).map(x=>x.trim()).filter(Boolean).map(x=>`<li>${x.replace(/^\d+\./,'').trim()}</li>`).join(''); }

function exportState(){
  const blob = new Blob([JSON.stringify(collect(), null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'quote-form.json'; a.click();
}
function importState(el){
  const f = el.files && el.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = () => { fill(JSON.parse(reader.result)); renderForm(); renderPreview(); };
  reader.readAsText(f, 'utf-8');
}
function getEqOptions(category, selected=''){
  const list = equipment.filter(e => !category || e.category === category);
  return '<option value="">請選擇設備名稱</option>' + list.map(e => `<option value="${e.id}" ${String(selected)===String(e.id)?'selected':''}>${e.name}${e.spec ? '｜'+e.spec : ''}</option>`).join('');
}
function unitOptions(selected=''){ return '<option value="">請選擇單位</option>' + units.map(u=>`<option value="${u.name}" ${selected===u.name?'selected':''}>${u.name}</option>`).join(''); }
function getCatOptions(selected=''){
  return '<option value="">請選擇設備類別</option>' + categories.map(c => `<option value="${c.name}" ${selected===c.name?'selected':''}>${c.code||''}｜${c.name}</option>`).join('');
}
function addItem(){ preserveBaseValues(); state.items.push({ item_desc:'', equipment_id:'', spec:'', qty:1, unit:'', unit_price:0 }); renderForm(); renderPreview(); }
function removeItem(i){ preserveBaseValues(); state.items.splice(i,1); renderForm(); renderPreview(); }
function itemTotal(it){ return Number(it.qty||0) * Number(it.unit_price||0); }
function totals(){ const subtotal = state.items.reduce((s,it)=>s+itemTotal(it),0); const tax = Math.round(subtotal*0.05); return { subtotal, tax, total: subtotal+tax }; }

function collect(){
  const id = state.id || '';
  return {
    id,
    quote_no: document.getElementById('quote_no').value,
    quote_date: document.getElementById('quote_date').value,
    client_id: document.getElementById('client_id').value || null,
    project_name: document.getElementById('project_name').value,
    quote_desc: document.getElementById('quote_desc').value,
    quote_terms: document.getElementById('quote_terms').value,
    items: state.items.map((it,idx)=>({
      item_order: idx+1,
      item_desc: it.item_desc || '',
      equipment_id: it.equipment_id || null,
      spec: it.spec || '',
      qty: Number(it.qty||0),
      unit: it.unit || '',
      unit_price: Number(it.unit_price||0)
    }))
  };
}

function preserveBaseValues(){
  if(!document.getElementById('quote_no')) return;
  window._formLoad = {
    ...(window._formLoad||{}),
    quote_no: document.getElementById('quote_no').value,
    quote_date: document.getElementById('quote_date').value,
    client_id: document.getElementById('client_id').value || null,
    project_name: document.getElementById('project_name').value,
    quote_desc: document.getElementById('quote_desc').value,
    quote_terms: document.getElementById('quote_terms').value
  };
}

function fill(data){
  state.id = data.id || state.id || '';
  state.items = (data.items || []).map(it => ({
    item_desc: it.item_desc || '',
    equipment_id: it.equipment_id || '',
    spec: it.spec || '',
    qty: it.qty || 1,
    unit: it.unit || '',
    unit_price: it.unit_price || 0
  }));
  if(!state.items.length) state.items = [{ item_desc:'', equipment_id:'', spec:'', qty:1, unit:'', unit_price:0 }];
  window._formLoad = data;
}

function bindBaseValues(){
  const d = window._formLoad || {};
  document.getElementById('quote_no').value = d.quote_no || '';
  document.getElementById('quote_date').value = d.quote_date || today();
  document.getElementById('client_id').value = d.client_id ? String(d.client_id) : '';
  document.getElementById('project_name').value = d.project_name || '';
  document.getElementById('quote_desc').value = d.quote_desc || '';
  document.getElementById('quote_terms').value = d.quote_terms || '1. 本報價單有效期限為15日。\n2. 完工驗收後請於次月5日前付款。\n3. 如有新增或變更項目，費用另行報價。';
}
function onCategoryChange(i, value){
  state.items[i].item_desc = value;
  state.items[i].equipment_id = '';
  state.items[i].spec = '';
  state.items[i].unit_price = 0;
  preserveBaseValues(); renderForm(); renderPreview();
}
function onEqChange(i, value){
  state.items[i].equipment_id = value;
  const eq = equipment.find(x => String(x.id) === String(value));
  if(eq){
    state.items[i].item_desc = eq.category || state.items[i].item_desc;
    state.items[i].spec = eq.name || '';
    state.items[i].unit_price = Number(eq.price||0);
  }
  preserveBaseValues(); renderForm(); renderPreview();
}
function renderForm(){
  topActions.innerHTML = `
    <button onclick="saveDoc()">儲存到系統</button>
    <button class="secondary" onclick="window.print()">列印 / 另存 PDF</button>
    <button class="light" onclick="exportState()">匯出資料</button>
    <label class="light" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;">匯入資料<input type="file" accept=".json" style="display:none" onchange="importState(this)"></label>
    <button class="light" onclick="clearForm()">清空</button>`;
  leftPanel.innerHTML = `
    <div class="form-section-title">基本資料</div>
    <label>報價單號</label><input id="quote_no">
    <div class="form-row">
      <div><label>日期</label><input id="quote_date" type="date"></div>
      <div><label>客戶</label><select id="client_id"><option value="">請選擇客戶</option>${clients.map(c=>`<option value="${c.id}">${c.client_name}</option>`).join('')}</select></div>
    </div>
    <label>工程名稱</label><input id="project_name">
    <div class="form-section-title">工程內容與費用</div>
    <div id="itemsBox"></div>
    <button type="button" onclick="addItem()">＋ 新增項目</button>
    <div class="form-section-title">說明</div>
    <label>施工 / 查修說明</label><textarea id="quote_desc"></textarea>
    <label>報價條款</label><textarea id="quote_terms"></textarea>
    <div class="hint">這一版採用你上傳的穩定列印模板，列印時只會保留右側文件內容。</div>`;
  bindBaseValues();
  const box = document.getElementById('itemsBox');
  box.innerHTML = state.items.map((it,i)=>`
    <div class="item-card">
      <div class="form-row">
        <div><label>估價事項</label><select onchange="onCategoryChange(${i}, this.value)">${getCatOptions(it.item_desc)}</select></div>
        <div><label>規格 / 設備名稱</label><select onchange="onEqChange(${i}, this.value)">${getEqOptions(it.item_desc, it.equipment_id)}</select></div>
      </div>
      <div class="form-row-3">
        <div><label>數量</label><input type="number" value="${it.qty}" oninput="state.items[${i}].qty=this.value; renderPreview()"></div>
        <div><label>單位</label><select onchange="state.items[${i}].unit=this.value; renderPreview()">${unitOptions(it.unit)}</select></div>
        <div><label>單價</label><input type="number" value="${it.unit_price}" oninput="state.items[${i}].unit_price=this.value; renderPreview()"></div>
      </div>
      <div class="muted">設備名稱：${it.spec || '—'}　小計：NT$ ${money(itemTotal(it))}</div>
      <div style="margin-top:8px"><button type="button" class="light" onclick="removeItem(${i})">刪除項目</button></div>
    </div>`).join('');
  ['quote_no','quote_date','client_id','project_name','quote_desc','quote_terms'].forEach(id => {
    document.getElementById(id).addEventListener('input', renderPreview);
    document.getElementById(id).addEventListener('change', renderPreview);
  });
}
function renderPreview(){
  const d = collect();
  const c = clients.find(x=>String(x.id)===String(d.client_id));
  const t = totals();
  preview.innerHTML = `
    <div class="doc-head">
      <div>
        <h2>昱拓弱電有限公司</h2>
        <div class="doc-sub">弱電系統維修｜監控｜門禁｜對講｜車道停管｜BA中央監控<br>電話：0960-770-512<br>地址：桃園市中壢區榮安一街490號13樓</div>
      </div>
      <div class="doc-sub" style="text-align:right;">
        <strong style="font-size:20px;color:#111827;">工程報價單</strong><br><br>
        單號：${d.quote_no || '＿＿＿＿'}<br>
        日期：${d.quote_date || '＿＿＿＿'}<br>
        客戶：${c?.client_name || '＿＿＿＿'}<br>
        統編：${c?.tax_id || '—'}
      </div>
    </div>
    <div class="block"><h3>工程名稱</h3><p>${d.project_name || '—'}</p></div>
    <div class="block">
      <h3>工程內容與費用</h3>
      <table class="quote-table">
        <thead><tr><th style="width:60px;">項次</th><th>估價事項</th><th>規格</th><th style="width:80px;">數量</th><th style="width:120px;">單價</th><th style="width:120px;">小計</th></tr></thead>
        <tbody>
          ${d.items.map((it,idx)=>`<tr><td>${idx+1}</td><td>${it.item_desc || ''}</td><td>${it.spec || ''}</td><td>${it.qty || ''}</td><td>NT$ ${money(it.unit_price||0)}</td><td>NT$ ${money((it.qty||0)*(it.unit_price||0))}</td></tr>`).join('') || '<tr><td colspan="6">尚無資料</td></tr>'}
        </tbody>
      </table>
      <p style="text-align:right;line-height:1.9;">小計：NT$ ${money(t.subtotal)}<br>營業稅：NT$ ${money(t.tax)}<br><strong>合計：NT$ ${money(t.total)}</strong></p>
    </div>
    <div class="block"><h3>施工 / 查修說明</h3><p>${(d.quote_desc || '—').replace(/\n/g,'<br>')}</p></div>
    <div class="block"><h3>報價條款</h3><ol>${linesToOl(d.quote_terms)}</ol></div>
    <div class="sign-grid">
      <div class="sign-box">客戶簽章：</div>
      <div class="sign-box">公司簽章：</div>
    </div>
    <div class="footer-note">昱拓弱電有限公司｜列印版文件</div>`;
}
async function saveDoc(){
  const data = collect();
  if(!data.client_id) return alert('請選擇客戶');
  if(!data.project_name) return alert('請輸入工程名稱');
  let res;
  if(state.id) res = await API.updateQuote(state.id, data);
  else res = await API.createQuote(data);
  const newId = res.id || res?.ok && res.id;
  if(newId && !state.id){ location.href = '/quote.html?id=' + newId; return; }
  alert('報價單已存檔');
}
function clearForm(){ window._formLoad = {}; state.id=''; state.items=[{ item_desc:'', equipment_id:'', spec:'', qty:1, unit:'', unit_price:0 }]; renderForm(); renderPreview(); }
(async()=>{
  clients = await API.getClients();
  categories = await API.getEquipmentCategories();
  equipment = await API.listEquipment();
  units = await API.getUnits();
  const next = await API.nextNo('quote');
  window._formLoad = { quote_no: next.doc_no, quote_date: today(), items:[{ item_desc:'', equipment_id:'', spec:'', qty:1, unit:'', unit_price:0 }] };
  if(state.id){
    const data = await API.getQuote(state.id);
    fill({ ...data, id: state.id, items: data.items || [] });
  } else {
    state.items=[{ item_desc:'', equipment_id:'', spec:'', qty:1, unit:'', unit_price:0 }];
  }
  renderForm(); renderPreview();
})().catch(err=>{ alert('載入報價單失敗：' + err.message); });

</script></body></html>
