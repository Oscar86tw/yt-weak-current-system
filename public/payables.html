<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>應付帳款｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('應付帳款',`<div class="list-panel"><div class="toolbar"><input id="search" placeholder="輸入供應商 / 單號 / 狀態查詢"></div><div id="list"></div></div>`);
let rows=[];async function load(){rows=await API.listPayables();render()}function render(){const k=search.value.trim().toLowerCase();const result=rows.filter(r=>`${r.purchase_no||''} ${r.supplier_name||''} ${r.payment_status||''}`.toLowerCase().includes(k)||!k);list.innerHTML=result.map(r=>`<div class="list-item"><strong>${r.purchase_no}｜${r.supplier_name}</strong><div>狀態：${r.payment_status}　方式：${r.payment_method||'—'}</div><div>到期日：${r.due_date||'—'}　付款日：${r.paid_date||'—'}</div><div>總額：NT$ ${money(r.total_amount||0)}　已付：NT$ ${money(r.paid_amount||0)}　未付：NT$ ${money(r.remaining_amount||0)}</div><div class="toolbar"><a class="btn" href="/purchase.html?id=${r.id}">修改進貨單</a></div></div>`).join('')||'<div class="muted">目前尚無應付帳款資料。</div>'}search.oninput=render;load();
</script></body></html>
