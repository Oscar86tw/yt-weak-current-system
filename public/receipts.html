<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>收據清單｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/forms-template.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
let rows = [];
let filtered = [];

function fmtDate(v){
  if(!v) return '';
  return String(v).slice(0,10);
}

function applyFilter(){
  const kw = (document.getElementById('kw').value || '').trim().toLowerCase();
  const dateFrom = document.getElementById('date_from').value || '';
  const dateTo = document.getElementById('date_to').value || '';

  filtered = rows.filter(r => {
    const text = [
      r.receipt_no || '',
      r.quote_no || '',
      r.project_name || '',
      r.client_name_display || r.client_name || ''
    ].join(' ').toLowerCase();

    const d = String(r.receipt_date || r.created_at || '').slice(0,10);
    const okKw = !kw || text.includes(kw);
    const okFrom = !dateFrom || d >= dateFrom;
    const okTo = !dateTo || d <= dateTo;
    return okKw && okFrom && okTo;
  });

  render();
}

function render(){
  const total = filtered.reduce((s, r) => s + Number(r.amount_received || 0), 0);
  document.getElementById('summary').innerHTML = `
    <div class="summary-card"><div class="summary-title">收據筆數</div><div class="summary-value">${filtered.length}</div></div>
    <div class="summary-card"><div class="summary-title">收款總額</div><div class="summary-value">NT$ ${money(total)}</div></div>
  `;

  const body = filtered.map(r => `
    <tr>
      <td>${r.receipt_no || ''}</td>
      <td>${fmtDate(r.receipt_date || r.created_at)}</td>
      <td>${r.quote_no || ''}</td>
      <td>${r.client_name_display || r.client_name || ''}</td>
      <td>${r.project_name || ''}</td>
      <td style="text-align:right;">NT$ ${money(r.amount_received || 0)}</td>
      <td>${r.payment_method || ''}</td>
      <td class="no-print actions-cell">
        <a class="btn-sm" href="/receipt.html?id=${r.id}">查看 / 修改</a>
        <button class="btn-sm light" onclick="printOne(${r.id})">列印</button>
      </td>
    </tr>
  `).join('');

  document.getElementById('table_body').innerHTML = body || `<tr><td colspan="8" class="empty-row">查無資料</td></tr>`;
}

async function load(){
  rows = await API.listReceipts();
  filtered = [...rows];
  render();
}

function printOne(id){
  location.href = '/receipt.html?id=' + id;
}

document.getElementById('app').innerHTML = shell('資料建立 / 收據 / 查詢 / 清單列表', `
<div class="doc-page">
  <div class="doc-header">
    <div>
      <h1>昱拓弱電有限公司｜V3.14.6A 收據查詢／清單列表正式版</h1>
      <p>資料建立 / 收據 / 查詢 / 清單列表</p>
    </div>
    <div class="doc-actions no-print">
      <button onclick="window.print()">列印清單</button>
    </div>
  </div>

  <div class="filter-panel no-print">
    <div class="filter-row">
      <div>
        <label>關鍵字查詢</label>
        <input id="kw" placeholder="收據編號 / 報價單號 / 客戶 / 工程名稱" oninput="applyFilter()">
      </div>
      <div>
        <label>日期起</label>
        <input id="date_from" type="date" onchange="applyFilter()">
      </div>
      <div>
        <label>日期迄</label>
        <input id="date_to" type="date" onchange="applyFilter()">
      </div>
    </div>
  </div>

  <div id="summary" class="summary-grid"></div>

  <div class="table-wrap">
    <table class="business-table">
      <thead>
        <tr>
          <th>收據編號</th>
          <th>收據日期</th>
          <th>報價單號</th>
          <th>客戶名稱</th>
          <th>工程名稱</th>
          <th>本次收款</th>
          <th>收款方式</th>
          <th class="no-print">操作</th>
        </tr>
      </thead>
      <tbody id="table_body"></tbody>
    </table>
  </div>
</div>`);
load();
</script></body></html>
