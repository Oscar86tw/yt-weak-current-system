<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>收據清單｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/forms-template.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
let rows = [];
function render(){
  list.innerHTML = rows.map(r=>`<div class="list-item"><strong>${r.receipt_no || ''}｜${r.project_name || '未命名工程'}</strong><div>日期：${r.receipt_date || ''}　客戶：${r.client_name_display || r.client_name || ''}</div><div>報價單號：${r.quote_no || ''}　本次收款：NT$ ${money(r.amount_received||0)}　累計已收：NT$ ${money(r.received_total_after||0)}　剩餘未收：NT$ ${money(r.remaining_balance||0)}</div><div class="toolbar"><a class="btn" href="/receipt.html?id=${r.id}">修改</a><button class="light" onclick="removeRow(${r.id})">刪除</button></div></div>`).join('') || '<div class="muted">尚無資料</div>';
}
async function load(){ rows = await API.listReceipts(); render(); }
async function removeRow(id){ try{ if(!confirm('確定刪除此收據嗎？')) return; await API.deleteReceipt(id); load(); }catch(err){ alert('刪除失敗：' + err.message); } }
document.getElementById('app').innerHTML = shell('資料建立 / 收據 / 清單列表', `<div class="split"><div class="form-panel"><h2 style="margin-top:0;">收據模組（避免重覆開立）</h2><div class="toolbar"><a class="btn" href="/receipt.html">新增收據</a><button onclick="downloadFile('/api/export/receipts','receipts_export.xlsx')">匯出 Excel</button></div><div class="info-box">本清單可用來查詢歷史收款、累計已收與未收餘額。</div></div><div class="list-panel"><div id="list"></div></div></div>`);
load();
</script></body></html>
