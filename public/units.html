<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>單位設定｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/forms-template.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('系統設定 / 單位設定',`<div class="split"><div class="form-panel"><h2 style="margin-top:0;">單位表單</h2><input type="hidden" id="unitId"><div class="form-row"><div><label>編號</label><input id="code" readonly></div><div><label>單位名稱</label><input id="unit_name" placeholder="例如：台、組、支、米"></div></div><div class="toolbar"><button id="saveBtn">存檔</button><button class="light" id="clearBtn">清空</button></div></div><div class="list-panel"><div id="list"></div></div></div>`);
const unitIdEl = document.getElementById('unitId');
const codeEl = document.getElementById('code');
const unitNameEl = document.getElementById('unit_name');
const listEl = document.getElementById('list');
const saveBtnEl = document.getElementById('saveBtn');
const clearBtnEl = document.getElementById('clearBtn');
let rows=[];
async function nextCode(){ try{ const r=await API.nextNo('unit'); return r.doc_no||String((rows.length||0)+1).padStart(4,'0'); }catch(err){ return String((rows.length||0)+1).padStart(4,'0'); } }
async function load(){ rows=await API.getUnits(); render(); if(!unitIdEl.value) codeEl.value=await nextCode(); }
function render(){ listEl.innerHTML=rows.map(r=>`<div class="list-item"><strong>${r.code||''}｜${r.name||''}</strong><div class="toolbar"><button onclick="editRow(${r.id})">修改</button><button class="danger" onclick="removeRow(${r.id})">刪除</button></div></div>`).join('')||'<div class="muted">尚無資料</div>'; }
function editRow(id){ const r=rows.find(x=>x.id===id); if(!r) return; unitIdEl.value=r.id; codeEl.value=r.code||''; unitNameEl.value=r.name||''; }
async function clearForm(){ unitIdEl.value=''; unitNameEl.value=''; codeEl.value=await nextCode(); }
async function save(){ try{ const p={code:(codeEl.value||'').trim(), name:(unitNameEl.value||'').trim()}; if(!p.name) return alert('請輸入單位名稱'); if(unitIdEl.value) await API.updateUnit(unitIdEl.value,p); else await API.createUnit(p); alert('單位已存檔'); await clearForm(); await load(); }catch(err){ alert('單位存檔失敗：' + err.message); } }
async function removeRow(id){ try{ if(!confirm('確定刪除此單位嗎？')) return; await API.deleteUnit(id); await clearForm(); await load(); }catch(err){ alert('刪除失敗：' + err.message); } }
saveBtnEl.onclick=save; clearBtnEl.onclick=clearForm; load();
</script></body></html>
