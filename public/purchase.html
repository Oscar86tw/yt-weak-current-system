<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>進貨單｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('新增進貨單',`<div class="split"><div class="form-panel"><h2 style="margin-top:0;">進貨單表單</h2><input type="hidden" id="docId"><div class="row"><div><label>進貨單號</label><input id="docNo" readonly></div><div><label>進貨日期</label><input id="docDate"></div></div><div class="row"><div><label>供應商</label><select id="supplierSelect"></select></div><div><label>供應商搜尋</label><input id="supplierSearch"></div></div><div class="row"><div><label>對應報價單</label><select id="quoteSelect"></select></div><div><label>案場名稱</label><input id="siteName"></div></div><label>備註</label><textarea id="memo"></textarea><div class="toolbar"><button id="addItemBtn">＋新增項目</button></div><div id="itemWrap"></div><div class="row3"><div><label>付款狀態</label><select id="payStatus"><option value="未付款">未付款</option><option value="部分付款">部分付款</option><option value="已付款">已付款</option></select></div><div><label>付款方式</label><select id="payMethod"><option value="現金">現金</option><option value="轉帳">轉帳</option><option value="月結">月結</option><option value="貨到付款">貨到付款</option><option value="其他">其他</option></select></div><div><label>到期日</label><input id="dueDate"></div></div><div class="row3"><div><label>已付金額</label><input id="paidAmount" value="0"></div><div><label>稅額</label><input id="taxAmount" value="0"></div><div><label>實際付款日</label><input id="paidDate"></div></div><div class="toolbar"><button id="saveBtn">存檔</button><button class="light" type="button" onclick="exportPdf()">匯出 PDF</button><button class="light" type="button" onclick="shareLine()">LINE 傳送</button></div></div><div class="preview-panel" id="preview"></div></div>`);
let suppliers=[],quotes=[],equipment=[],items=[];
function renderSupplierOptions(list){supplierSelect.innerHTML='<option value="">請選擇供應商</option>'+list.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
function renderQuoteOptions(){quoteSelect.innerHTML='<option value="">不綁定報價單</option>'+quotes.map(q=>`<option value="${q.id}">${q.quote_no||''}｜${q.project_name||''}</option>`).join('')}
function filterSuppliers(){const k=supplierSearch.value.trim().toLowerCase();renderSupplierOptions(suppliers.filter(s=>(s.name||'').toLowerCase().includes(k)||!k))}
function addItem(){items.push({equipment_id:'',item_name:'',spec:'',qty:'1',unit:'組',unit_cost:'0'});renderItems();renderDoc()}
function removeItem(i){items.splice(i,1);renderItems();renderDoc()}
function updateItem(i,k,v){items[i][k]=v;if(k==='equipment_id'){const e=equipment.find(x=>String(x.id)===String(v));if(e){items[i].item_name=e.name||'';items[i].spec=e.spec||'';items[i].unit_cost=String(e.cost||0)}}renderItems();renderDoc()}
function rowTotal(r){return Number(r.qty||0)*Number(r.unit_cost||0)}
function renderItems(){itemWrap.innerHTML=items.map((r,i)=>`<div class="quote-item-card"><div class="toolbar" style="justify-content:space-between;align-items:center;"><strong>項目 ${i+1}</strong><button class="danger" onclick="removeItem(${i})">刪除</button></div><label>設備</label><select onchange="updateItem(${i},'equipment_id',this.value)"><option value="">手動輸入</option>${equipment.map(e=>`<option value="${e.id}" ${String(r.equipment_id)===String(e.id)?'selected':''}>${e.name}</option>`).join('')}</select><div class="row"><div><label>名稱</label><input value="${r.item_name||''}" oninput="updateItem(${i},'item_name',this.value)"></div><div><label>規格</label><input value="${r.spec||''}" oninput="updateItem(${i},'spec',this.value)"></div></div><div class="row3"><div><label>數量</label><input value="${r.qty||''}" oninput="updateItem(${i},'qty',this.value)"></div><div><label>單位</label><input value="${r.unit||''}" oninput="updateItem(${i},'unit',this.value)"></div><div><label>成本單價</label><input value="${r.unit_cost||''}" oninput="updateItem(${i},'unit_cost',this.value)"></div></div><div>小計：NT$ ${money(rowTotal(r))}</div></div>`).join('')||'<div class="muted">尚未新增項目。</div>'}
function totals(){const subtotal=items.reduce((s,r)=>s+rowTotal(r),0),tax=Number(taxAmount.value||0),total=subtotal+tax,paid=Number(paidAmount.value||0),remain=total-paid;return {subtotal,tax,total,paid,remain}}
function renderDoc(){const t=totals();const supplier=suppliers.find(s=>String(s.id)===String(supplierSelect.value));const quote=quotes.find(q=>String(q.id)===String(quoteSelect.value));preview.innerHTML=`<div class="doc-head"><div><h2>${COMPANY.name}</h2><div class="doc-sub">案場進貨單<br>電話：${COMPANY.phone}<br>地址：${COMPANY.address}</div></div><div class="doc-sub" style="text-align:right;"><strong style="font-size:20px;color:#111827;">進貨單</strong><br><br>單號：${docNo.value||'＿＿＿＿'}<br>日期：${docDate.value||'＿＿＿＿'}<br>供應商：${supplier?.name||'＿＿＿＿'}<br>對應報價：${quote?.quote_no||'—'}<br>案場：${siteName.value||'＿＿＿＿'}</div></div><div class="block"><h3>進貨明細</h3><table class="table"><thead><tr><th>項次</th><th>名稱</th><th>規格</th><th>數量</th><th>單位</th><th>成本單價</th><th>小計</th></tr></thead><tbody>${items.map((r,i)=>`<tr><td>${i+1}</td><td>${r.item_name||''}</td><td>${r.spec||''}</td><td>${r.qty||''}</td><td>${r.unit||''}</td><td>NT$ ${money(r.unit_cost||0)}</td><td>NT$ ${money(rowTotal(r))}</td></tr>`).join('')||'<tr><td colspan="7">尚無資料</td></tr>'}</tbody></table><p style="text-align:right;line-height:1.9;">小計：NT$ ${money(t.subtotal)}<br>稅額：NT$ ${money(t.tax)}<br><strong>總額：NT$ ${money(t.total)}</strong><br>已付：NT$ ${money(t.paid)}<br>未付：NT$ ${money(t.remain)}</p></div><div class="block"><h3>付款資訊</h3><p>狀態：${payStatus.value}<br>方式：${payMethod.value}<br>到期日：${dueDate.value||'—'}<br>付款日：${paidDate.value||'—'}</p></div><div class="block"><h3>備註</h3><p>${memo.value||'—'}</p></div>`}
async function saveDoc(){const p={purchase_no:docNo.value,purchase_date:docDate.value,supplier_id:supplierSelect.value||null,quote_id:quoteSelect.value||null,site_name:siteName.value||'',memo:memo.value||'',payment_status:payStatus.value,payment_method:payMethod.value,due_date:dueDate.value||'',paid_amount:Number(paidAmount.value||0),tax_amount:Number(taxAmount.value||0),paid_date:paidDate.value||'',items:items.map((r,i)=>({item_order:i+1,equipment_id:r.equipment_id||null,item_name:r.item_name||'',spec:r.spec||'',qty:Number(r.qty||0),unit:r.unit||'',unit_cost:Number(r.unit_cost||0)}))};if(!p.supplier_id)return alert('請先選擇供應商');if(!items.length)return alert('請至少新增一筆項目');let res; if(docId.value) res=await API.updatePurchase(docId.value,p); else res=await API.createPurchase(p); if(res&&res.id&&!docId.value){ location.href='/purchase.html?id='+res.id; return; } alert('進貨單已存檔')}
async function init(){suppliers=await API.getSuppliers();quotes=await API.listQuotes();equipment=await API.listEquipment();renderSupplierOptions(suppliers);renderQuoteOptions();const next=await API.nextNo('purchase');docNo.value=next.doc_no;addItem();['docDate','siteName','memo','payStatus','payMethod','dueDate','paidAmount','taxAmount','paidDate'].forEach(id=>document.getElementById(id).addEventListener('input',renderDoc));supplierSearch.oninput=filterSuppliers;supplierSelect.onchange=renderDoc;quoteSelect.onchange=renderDoc;addItemBtn.onclick=addItem;saveBtn.onclick=saveDoc;const id=qs('id');if(id){docId.value=id;const d=await API.getPurchase(id);docNo.value=d.purchase_no||'';docDate.value=d.purchase_date||'';supplierSelect.value=d.supplier_id?String(d.supplier_id):'';quoteSelect.value=d.quote_id?String(d.quote_id):'';siteName.value=d.site_name||'';memo.value=d.memo||'';payStatus.value=d.payment_status||'未付款';payMethod.value=d.payment_method||'現金';dueDate.value=d.due_date||'';paidAmount.value=d.paid_amount||0;taxAmount.value=d.tax_amount||0;paidDate.value=d.paid_date||'';items=(d.items||[]).map(x=>({equipment_id:x.equipment_id||'',item_name:x.item_name||'',spec:x.spec||'',qty:x.qty||'',unit:x.unit||'',unit_cost:x.unit_cost||''}))}renderItems();renderDoc()}function exportPdf(){ const id=docId.value||qs('id'); if(!id) return alert('請先存檔後再匯出 PDF'); downloadFile('/api/purchases/'+id+'/pdf'); } function shareLine(){ const id=docId.value||qs('id'); lineSharePdf('purchases',id); } init();
</script></body></html>
