<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>йҖІиІЁе–®пҪңжҳұжӢ“ејұйӣ»</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('ж–°еўһйҖІиІЁе–®',`<div class="split"><div class="form-panel"><h2 style="margin-top:0;">йҖІиІЁе–®иЎЁе–®</h2><input type="hidden" id="docId"><div class="row"><div><label>йҖІиІЁе–®иҷҹ</label><input id="docNo" readonly></div><div><label>йҖІиІЁж—Ҙжңҹ</label><input id="docDate"></div></div><div class="row"><div><label>дҫӣжҮүе•Ҷ</label><select id="supplierSelect"></select></div><div><label>дҫӣжҮүе•Ҷжҗңе°Ӣ</label><input id="supplierSearch"></div></div><div class="row"><div><label>е°ҚжҮүе ұеғ№е–®</label><select id="quoteSelect"></select></div><div><label>жЎҲе ҙеҗҚзЁұ</label><input id="siteName"></div></div><label>еӮҷиЁ»</label><textarea id="memo"></textarea><div class="toolbar"><button id="addItemBtn">пјӢж–°еўһй …зӣ®</button></div><div id="itemWrap"></div><div class="row3"><div><label>д»ҳж¬ҫзӢҖж…Ӣ</label><select id="payStatus"><option value="жңӘд»ҳж¬ҫ">жңӘд»ҳж¬ҫ</option><option value="йғЁеҲҶд»ҳж¬ҫ">йғЁеҲҶд»ҳж¬ҫ</option><option value="е·Ід»ҳж¬ҫ">е·Ід»ҳж¬ҫ</option></select></div><div><label>д»ҳж¬ҫж–№ејҸ</label><select id="payMethod"><option value="зҸҫйҮ‘">зҸҫйҮ‘</option><option value="иҪүеёі">иҪүеёі</option><option value="жңҲзөҗ">жңҲзөҗ</option><option value="иІЁеҲ°д»ҳж¬ҫ">иІЁеҲ°д»ҳж¬ҫ</option><option value="е…¶д»–">е…¶д»–</option></select></div><div><label>еҲ°жңҹж—Ҙ</label><input id="dueDate"></div></div><div class="row3"><div><label>е·Ід»ҳйҮ‘йЎҚ</label><input id="paidAmount" value="0"></div><div><label>зЁ…йЎҚ</label><input id="taxAmount" value="0"></div><div><label>еҜҰйҡӣд»ҳж¬ҫж—Ҙ</label><input id="paidDate"></div></div><div class="toolbar"><button id="saveBtn">еӯҳжӘ”</button></div></div><div class="preview-panel" id="preview"></div></div>`);
let suppliers=[],quotes=[],equipment=[],items=[];
function renderSupplierOptions(list){supplierSelect.innerHTML='<option value="">и«ӢйҒёж“ҮдҫӣжҮүе•Ҷ</option>'+list.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
function renderQuoteOptions(){quoteSelect.innerHTML='<option value="">дёҚз¶Ғе®ҡе ұеғ№е–®</option>'+quotes.map(q=>`<option value="${q.id}">${q.quote_no||''}пҪң${q.project_name||''}</option>`).join('')}
function filterSuppliers(){const k=supplierSearch.value.trim().toLowerCase();renderSupplierOptions(suppliers.filter(s=>(s.name||'').toLowerCase().includes(k)||!k))}
function addItem(){items.push({equipment_id:'',item_name:'',spec:'',qty:'1',unit:'зө„',unit_cost:'0'});renderItems();renderDoc()}
function removeItem(i){items.splice(i,1);renderItems();renderDoc()}
function updateItem(i,k,v){items[i][k]=v;if(k==='equipment_id'){const e=equipment.find(x=>String(x.id)===String(v));if(e){items[i].item_name=e.name||'';items[i].spec=e.spec||'';items[i].unit_cost=String(e.cost||0)}}renderItems();renderDoc()}
function rowTotal(r){return Number(r.qty||0)*Number(r.unit_cost||0)}
function renderItems(){itemWrap.innerHTML=items.map((r,i)=>`<div class="quote-item-card"><div class="toolbar" style="justify-content:space-between;align-items:center;"><strong>й …зӣ® ${i+1}</strong><button class="danger" onclick="removeItem(${i})">еҲӘйҷӨ</button></div><label>иЁӯеӮҷ</label><select onchange="updateItem(${i},'equipment_id',this.value)"><option value="">жүӢеӢ•ијёе…Ҙ</option>${equipment.map(e=>`<option value="${e.id}" ${String(r.equipment_id)===String(e.id)?'selected':''}>${e.name}</option>`).join('')}</select><div class="row"><div><label>еҗҚзЁұ</label><input value="${r.item_name||''}" oninput="updateItem(${i},'item_name',this.value)"></div><div><label>иҰҸж ј</label><input value="${r.spec||''}" oninput="updateItem(${i},'spec',this.value)"></div></div><div class="row3"><div><label>ж•ёйҮҸ</label><input value="${r.qty||''}" oninput="updateItem(${i},'qty',this.value)"></div><div><label>е–®дҪҚ</label><input value="${r.unit||''}" oninput="updateItem(${i},'unit',this.value)"></div><div><label>жҲҗжң¬е–®еғ№</label><input value="${r.unit_cost||''}" oninput="updateItem(${i},'unit_cost',this.value)"></div></div><div>е°ҸиЁҲпјҡNT$ ${money(rowTotal(r))}</div></div>`).join('')||'<div class="muted">е°ҡжңӘж–°еўһй …зӣ®гҖӮ</div>'}
function totals(){const subtotal=items.reduce((s,r)=>s+rowTotal(r),0),tax=Number(taxAmount.value||0),total=subtotal+tax,paid=Number(paidAmount.value||0),remain=total-paid;return {subtotal,tax,total,paid,remain}}
function renderDoc(){const t=totals();const supplier=suppliers.find(s=>String(s.id)===String(supplierSelect.value));const quote=quotes.find(q=>String(q.id)===String(quoteSelect.value));preview.innerHTML=`<div class="doc-head"><div><h2>${COMPANY.name}</h2><div class="doc-sub">жЎҲе ҙйҖІиІЁе–®<br>йӣ»и©ұпјҡ${COMPANY.phone}<br>ең°еқҖпјҡ${COMPANY.address}</div></div><div class="doc-sub" style="text-align:right;"><strong style="font-size:20px;color:#111827;">йҖІиІЁе–®</strong><br><br>е–®иҷҹпјҡ${docNo.value||'пјҝпјҝпјҝпјҝ'}<br>ж—Ҙжңҹпјҡ${docDate.value||'пјҝпјҝпјҝпјҝ'}<br>дҫӣжҮүе•Ҷпјҡ${supplier?.name||'пјҝпјҝпјҝпјҝ'}<br>е°ҚжҮүе ұеғ№пјҡ${quote?.quote_no||'вҖ”'}<br>жЎҲе ҙпјҡ${siteName.value||'пјҝпјҝпјҝпјҝ'}</div></div><div class="block"><h3>йҖІиІЁжҳҺзҙ°</h3><table class="table"><thead><tr><th>й …ж¬Ў</th><th>еҗҚзЁұ</th><th>иҰҸж ј</th><th>ж•ёйҮҸ</th><th>е–®дҪҚ</th><th>жҲҗжң¬е–®еғ№</th><th>е°ҸиЁҲ</th></tr></thead><tbody>${items.map((r,i)=>`<tr><td>${i+1}</td><td>${r.item_name||''}</td><td>${r.spec||''}</td><td>${r.qty||''}</td><td>${r.unit||''}</td><td>NT$ ${money(r.unit_cost||0)}</td><td>NT$ ${money(rowTotal(r))}</td></tr>`).join('')||'<tr><td colspan="7">е°ҡз„ЎиіҮж–ҷ</td></tr>'}</tbody></table><p style="text-align:right;line-height:1.9;">е°ҸиЁҲпјҡNT$ ${money(t.subtotal)}<br>зЁ…йЎҚпјҡNT$ ${money(t.tax)}<br><strong>зёҪйЎҚпјҡNT$ ${money(t.total)}</strong><br>е·Ід»ҳпјҡNT$ ${money(t.paid)}<br>жңӘд»ҳпјҡNT$ ${money(t.remain)}</p></div><div class="block"><h3>д»ҳж¬ҫиіҮиЁҠ</h3><p>зӢҖж…Ӣпјҡ${payStatus.value}<br>ж–№ејҸпјҡ${payMethod.value}<br>еҲ°жңҹж—Ҙпјҡ${dueDate.value||'вҖ”'}<br>д»ҳж¬ҫж—Ҙпјҡ${paidDate.value||'вҖ”'}</p></div><div class="block"><h3>еӮҷиЁ»</h3><p>${memo.value||'вҖ”'}</p></div>`}
async function saveDoc(){const p={purchase_no:docNo.value,purchase_date:docDate.value,supplier_id:supplierSelect.value||null,quote_id:quoteSelect.value||null,site_name:siteName.value||'',memo:memo.value||'',payment_status:payStatus.value,payment_method:payMethod.value,due_date:dueDate.value||'',paid_amount:Number(paidAmount.value||0),tax_amount:Number(taxAmount.value||0),paid_date:paidDate.value||'',items:items.map((r,i)=>({item_order:i+1,equipment_id:r.equipment_id||null,item_name:r.item_name||'',spec:r.spec||'',qty:Number(r.qty||0),unit:r.unit||'',unit_cost:Number(r.unit_cost||0)}))};if(!p.supplier_id)return alert('и«Ӣе…ҲйҒёж“ҮдҫӣжҮүе•Ҷ');if(!items.length)return alert('и«ӢиҮіе°‘ж–°еўһдёҖзӯҶй …зӣ®');if(docId.value) await API.updatePurchase(docId.value,p); else await API.createPurchase(p); alert('йҖІиІЁе–®е·ІеӯҳжӘ”')}
async function init(){suppliers=await API.getSuppliers();quotes=await API.listQuotes();equipment=await API.listEquipment();renderSupplierOptions(suppliers);renderQuoteOptions();const next=await API.nextNo('purchase');docNo.value=next.doc_no;addItem();['docDate','siteName','memo','payStatus','payMethod','dueDate','paidAmount','taxAmount','paidDate'].forEach(id=>document.getElementById(id).addEventListener('input',renderDoc));supplierSearch.oninput=filterSuppliers;supplierSelect.onchange=renderDoc;quoteSelect.onchange=renderDoc;addItemBtn.onclick=addItem;saveBtn.onclick=saveDoc;const id=qs('id');if(id){docId.value=id;const d=await API.getPurchase(id);docNo.value=d.purchase_no||'';docDate.value=d.purchase_date||'';supplierSelect.value=d.supplier_id?String(d.supplier_id):'';quoteSelect.value=d.quote_id?String(d.quote_id):'';siteName.value=d.site_name||'';memo.value=d.memo||'';payStatus.value=d.payment_status||'жңӘд»ҳж¬ҫ';payMethod.value=d.payment_method||'зҸҫйҮ‘';dueDate.value=d.due_date||'';paidAmount.value=d.paid_amount||0;taxAmount.value=d.tax_amount||0;paidDate.value=d.paid_date||'';items=(d.items||[]).map(x=>({equipment_id:x.equipment_id||'',item_name:x.item_name||'',spec:x.spec||'',qty:x.qty||'',unit:x.unit||'',unit_cost:x.unit_cost||''}))}renderItems();renderDoc()}init();
</script></body></html>
