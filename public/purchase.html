<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>進貨單｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/forms-template.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML = shell('資料建立 / 進貨單 / 新增', `<div class="form-wrap">
  <div class="form-topbar">
    <div class="form-brand">
      <h1>昱拓弱電有限公司｜V3.9 完整整合版</h1>
      <p>資料建立 / 進貨單 / 新增</p>
    </div>
    <div class="form-actions no-print" id="topActions"></div>
  </div>
  <div class="form-grid">
    <div class="form-panel" id="leftPanel"></div>
    <div class="form-preview" id="preview"></div>
  </div>
</div>`);

const state = { id: qs('id') || '', items: [] };
let suppliers = [], quotes = [], equipment = [];
function today(){ return new Date().toISOString().slice(0,10); }
function money(v){ return Number(v||0).toLocaleString('zh-TW'); }
function exportState(){ const blob=new Blob([JSON.stringify(collect(), null, 2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='purchase-form.json'; a.click(); }
function importState(el){ const f=el.files&&el.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ fill(JSON.parse(r.result)); renderForm(); renderPreview();}; r.readAsText(f,'utf-8'); }
function addItem(){ state.items.push({ equipment_id:'', item_name:'', spec:'', qty:1, unit:'式', unit_cost:0 }); renderForm(); renderPreview(); }
function removeItem(i){ state.items.splice(i,1); renderForm(); renderPreview(); }
function itemTotal(it){ return Number(it.qty||0)*Number(it.unit_cost||0); }
function totals(){ const subtotal = state.items.reduce((s,it)=>s+itemTotal(it),0); const tax_amount = Number(tax_amount_input?.value || 0); const total = subtotal + tax_amount; const paid_amount = Number(paid_amount_input?.value || 0); return { subtotal, tax_amount, total, paid_amount, remaining: total - paid_amount }; }
function eqOptions(selected=''){ return '<option value="">請選擇設備</option>' + equipment.map(e=>`<option value="${e.id}" ${String(selected)===String(e.id)?'selected':''}>${e.name}${e.spec?'｜'+e.spec:''}</option>`).join(''); }
function onEqChange(i, v){ state.items[i].equipment_id=v; const e=equipment.find(x=>String(x.id)===String(v)); if(e){ state.items[i].item_name=e.name||''; state.items[i].spec=e.spec||''; state.items[i].unit_cost=Number(e.cost||0); } renderForm(); renderPreview(); }
function collect(){ const t=totals(); return { purchase_no: purchase_no.value, purchase_date: purchase_date.value, supplier_id: supplier_id.value||null, quote_id: quote_id.value||null, site_name: site_name.value, memo: memo.value, tax_amount: Number(tax_amount_input.value||0), payment_status: payment_status.value, payment_method: payment_method.value, due_date: due_date.value, paid_amount: Number(paid_amount_input.value||0), paid_date: paid_date.value, items: state.items.map((it,idx)=>({ item_order:idx+1, equipment_id:it.equipment_id||null, item_name:it.item_name||'', spec:it.spec||'', qty:Number(it.qty||0), unit:it.unit||'', unit_cost:Number(it.unit_cost||0) })) }; }
function fill(d){ state.id=d.id||state.id||''; state.items=(d.items||[]).map(it=>({ equipment_id:it.equipment_id||'', item_name:it.item_name||'', spec:it.spec||'', qty:it.qty||1, unit:it.unit||'式', unit_cost:it.unit_cost||0 })); if(!state.items.length) state.items=[{ equipment_id:'', item_name:'', spec:'', qty:1, unit:'式', unit_cost:0 }]; window._formLoad=d; }
function bindBase(){ const d=window._formLoad||{}; purchase_no.value=d.purchase_no||''; purchase_date.value=d.purchase_date||today(); supplier_id.value=d.supplier_id?String(d.supplier_id):''; quote_id.value=d.quote_id?String(d.quote_id):''; site_name.value=d.site_name||''; memo.value=d.memo||''; tax_amount_input.value=d.tax_amount||0; payment_status.value=d.payment_status||'未付款'; payment_method.value=d.payment_method||'現金'; due_date.value=d.due_date||''; paid_amount_input.value=d.paid_amount||0; paid_date.value=d.paid_date||''; }
function renderForm(){ topActions.innerHTML=`<button onclick="saveDoc()">儲存到系統</button><button class="secondary" onclick="window.print()">列印 / 另存 PDF</button><button class="light" onclick="exportState()">匯出資料</button><label class="light" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;">匯入資料<input type="file" accept=".json" style="display:none" onchange="importState(this)"></label><button class="light" onclick="clearForm()">清空</button>`;
leftPanel.innerHTML=`
<div class="form-section-title">基本資料</div>
<label>進貨單號</label><input id="purchase_no">
<div class="form-row"><div><label>日期</label><input id="purchase_date" type="date"></div><div><label>供應商</label><select id="supplier_id"><option value="">請選擇供應商</option>${suppliers.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div></div>
<div class="form-row"><div><label>對應報價單</label><select id="quote_id"><option value="">可不選</option>${quotes.map(q=>`<option value="${q.id}">${q.quote_no || ''}｜${q.project_name || ''}</option>`).join('')}</select></div><div><label>案場</label><input id="site_name"></div></div>
<label>進貨備註</label><textarea id="memo"></textarea>
<div class="form-section-title">進貨項目</div><div id="itemsBox"></div><button type="button" onclick="addItem()">＋ 新增項目</button>
<div class="form-row-3"><div><label>稅額</label><input id="tax_amount_input" type="number"></div><div><label>付款狀態</label><select id="payment_status"><option value="未付款">未付款</option><option value="部分付款">部分付款</option><option value="已付款">已付款</option></select></div><div><label>付款方式</label><select id="payment_method"><option value="現金">現金</option><option value="轉帳">轉帳</option><option value="月結">月結</option><option value="貨到付款">貨到付款</option><option value="其他">其他</option></select></div></div>
<div class="form-row"><div><label>到期日</label><input id="due_date" type="date"></div><div><label>已付款</label><input id="paid_amount_input" type="number"></div></div>
<label>付款日期</label><input id="paid_date" type="date">
<div class="hint">這版進貨單也改成穩定列印模板，避免先前新增存檔頁面不穩。</div>`;
bindBase();
const box=document.getElementById('itemsBox');
box.innerHTML = state.items.map((it,i)=>`
  <div class="item-card">
    <label>設備</label><select onchange="onEqChange(${i},this.value)">${eqOptions(it.equipment_id)}</select>
    <div class="form-row"><div><label>名稱</label><input value="${it.item_name}" oninput="state.items[${i}].item_name=this.value; renderPreview()"></div><div><label>規格</label><input value="${it.spec}" oninput="state.items[${i}].spec=this.value; renderPreview()"></div></div>
    <div class="form-row-3"><div><label>數量</label><input type="number" value="${it.qty}" oninput="state.items[${i}].qty=this.value; renderPreview()"></div><div><label>單位</label><input value="${it.unit}" oninput="state.items[${i}].unit=this.value; renderPreview()"></div><div><label>單價</label><input type="number" value="${it.unit_cost}" oninput="state.items[${i}].unit_cost=this.value; renderPreview()"></div></div>
    <div class="muted">小計：NT$ ${money(itemTotal(it))}</div><div style="margin-top:8px"><button type="button" class="light" onclick="removeItem(${i})">刪除項目</button></div>
  </div>`).join('');
['purchase_no','purchase_date','supplier_id','quote_id','site_name','memo','tax_amount_input','payment_status','payment_method','due_date','paid_amount_input','paid_date'].forEach(id=>{ window[id].addEventListener('input', renderPreview); window[id].addEventListener('change', renderPreview);});
}
function renderPreview(){ const d=collect(); const s=suppliers.find(x=>String(x.id)===String(d.supplier_id)); const q=quotes.find(x=>String(x.id)===String(d.quote_id)); const t=totals(); preview.innerHTML=`
<div class="doc-head"><div><h2>昱拓弱電有限公司</h2><div class="doc-sub">弱電系統維修｜監控｜門禁｜對講｜車道停管｜BA中央監控<br>電話：0960-770-512<br>地址：桃園市中壢區榮安一街490號13樓</div></div>
<div class="doc-sub" style="text-align:right;"><strong style="font-size:20px;color:#111827;">進貨單</strong><br><br>單號：${d.purchase_no||'＿＿＿＿'}<br>日期：${d.purchase_date||'＿＿＿＿'}<br>供應商：${s?.name||'＿＿＿＿'}<br>對應報價：${q?.quote_no||''}</div></div>
<div class="block"><h3>案場 / 備註</h3><p>案場：${d.site_name||''}<br>${(d.memo||'').replace(/\n/g,'<br>')}</p></div>
<div class="block"><h3>進貨內容與費用</h3>
<table class="quote-table"><thead><tr><th>項次</th><th>名稱</th><th>規格</th><th>數量</th><th>單位</th><th>單價</th><th>小計</th></tr></thead><tbody>
${d.items.map((it,idx)=>`<tr><td>${idx+1}</td><td>${it.item_name||''}</td><td>${it.spec||''}</td><td>${it.qty||''}</td><td>${it.unit||''}</td><td>NT$ ${money(it.unit_cost||0)}</td><td>NT$ ${money((it.qty||0)*(it.unit_cost||0))}</td></tr>`).join('') || '<tr><td colspan="7">尚無資料</td></tr>'}
</tbody></table>
<p style="text-align:right;line-height:1.9;">小計：NT$ ${money(t.subtotal)}<br>稅額：NT$ ${money(t.tax_amount)}<br><strong>總額：NT$ ${money(t.total)}</strong><br>已付：NT$ ${money(t.paid_amount)}<br>未付：NT$ ${money(t.remaining)}</p></div>
<div class="block"><h3>付款資訊</h3><p>付款狀態：${d.payment_status}<br>付款方式：${d.payment_method}<br>到期日：${d.due_date||'—'}<br>付款日期：${d.paid_date||'—'}</p></div>
<div class="sign-grid"><div class="sign-box">承辦簽章：</div><div class="sign-box">主管簽章：</div></div>`; }
async function saveDoc(){ const d=collect(); if(!d.supplier_id) return alert('請選擇供應商'); let r; if(state.id) r=await API.updatePurchase(state.id,d); else r=await API.createPurchase(d); if(r.id && !state.id){ location.href='/purchase.html?id='+r.id; return; } alert('進貨單已存檔'); }
function clearForm(){ window._formLoad={}; state.id=''; state.items=[{ equipment_id:'', item_name:'', spec:'', qty:1, unit:'式', unit_cost:0 }]; renderForm(); renderPreview(); }
(async()=>{ suppliers=await API.getSuppliers(); quotes=await API.listQuotes(); equipment=await API.listEquipment(); const next=await API.nextNo('purchase'); window._formLoad={purchase_no:next.doc_no,purchase_date:today(),payment_status:'未付款',payment_method:'現金',items:[{ equipment_id:'', item_name:'', spec:'', qty:1, unit:'式', unit_cost:0 }]}; if(state.id){ const d=await API.getPurchase(state.id); fill({...d,id:state.id}); } else { state.items=[{ equipment_id:'', item_name:'', spec:'', qty:1, unit:'式', unit_cost:0 }]; } renderForm(); renderPreview(); })();

</script></body></html>
