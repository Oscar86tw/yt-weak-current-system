<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>系統設定｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('系統設定 / 公司基本設定',`<div class="split"><div class="form-panel"><h2 style="margin-top:0;">公司基本資料</h2><label>公司名稱</label><input id="companyName"><label>公司簡介 / 標語</label><input id="companyTag"><div class="row"><div><label>公司電話</label><input id="companyPhone"></div><div><label>公司地址</label><input id="companyAddress"></div></div><h2>文件編號規則</h2><div class="row3"><div><label>報價單前綴</label><input id="quotePrefix"></div><div><label>維護合約單前綴</label><input id="contractPrefix"></div><div><label>驗收單前綴</label><input id="acceptPrefix"></div></div><div class="row"><div><label>進貨單前綴</label><input id="purchasePrefix"></div><div><label>流水號位數</label><input id="serialDigits"></div></div><h2>SMTP 郵件設定</h2><div class="row"><div><label>SMTP Host</label><input id="smtpHost"></div><div><label>SMTP Port</label><input id="smtpPort"></div></div><div class="row"><div><label>SMTP User</label><input id="smtpUser"></div><div><label>SMTP Pass</label><input id="smtpPass" type="password"></div></div><div class="row"><div><label>SMTP Secure</label><select id="smtpSecure"><option value="false">false</option><option value="true">true</option></select></div><div><label>MAIL_FROM</label><input id="mailFrom"></div></div><div class="toolbar"><button id="saveBtn">儲存設定</button></div></div><div class="preview-panel"><div class="block"><h3>說明</h3><p>本頁可統一管理公司基本資料、文件編號規則與 SMTP 郵件設定。系統設定儲存至資料庫，作為後台配置參考。</p></div><div class="block"><h3>目前設定預覽</h3><p id="previewText">讀取中...</p></div></div></div>`);
async function load(){const s=await API.getSettings();companyName.value=s.company_name||'';companyTag.value=s.company_tag||'';companyPhone.value=s.company_phone||'';companyAddress.value=s.company_address||'';quotePrefix.value=s.quote_prefix||'YA';contractPrefix.value=s.contract_prefix||'YB';acceptPrefix.value=s.acceptance_prefix||'YC';purchasePrefix.value=s.purchase_prefix||'PI';serialDigits.value=s.serial_digits||3;smtpHost.value=s.smtp_host||'';smtpPort.value=s.smtp_port||'';smtpUser.value=s.smtp_user||'';smtpPass.value=s.smtp_pass||'';smtpSecure.value=String(s.smtp_secure||false);mailFrom.value=s.mail_from||'';renderPreview();}
function renderPreview(){previewText.innerHTML=`公司：${companyName.value||'—'}<br>標語：${companyTag.value||'—'}<br>電話：${companyPhone.value||'—'}<br>地址：${companyAddress.value||'—'}<br><br>文件前綴：報價 ${quotePrefix.value||'YA'} / 合約 ${contractPrefix.value||'YB'} / 驗收 ${acceptPrefix.value||'YC'} / 進貨 ${purchasePrefix.value||'PI'}<br>流水號位數：${serialDigits.value||3}<br><br>SMTP：${smtpHost.value||'—'}:${smtpPort.value||'—'} / ${smtpUser.value||'—'} / secure=${smtpSecure.value}<br>MAIL_FROM：${mailFrom.value||'—'}`;}
async function save(){const p={company_name:companyName.value.trim(),company_tag:companyTag.value.trim(),company_phone:companyPhone.value.trim(),company_address:companyAddress.value.trim(),quote_prefix:quotePrefix.value.trim(),contract_prefix:contractPrefix.value.trim(),acceptance_prefix:acceptPrefix.value.trim(),purchase_prefix:purchasePrefix.value.trim(),serial_digits:Number(serialDigits.value||3),smtp_host:smtpHost.value.trim(),smtp_port:smtpPort.value.trim(),smtp_user:smtpUser.value.trim(),smtp_pass:smtpPass.value,smtp_secure:smtpSecure.value==='true',mail_from:mailFrom.value.trim()};await API.saveSettings(p);alert('系統設定已儲存');renderPreview();}
['companyName','companyTag','companyPhone','companyAddress','quotePrefix','contractPrefix','acceptPrefix','purchasePrefix','serialDigits','smtpHost','smtpPort','smtpUser','smtpPass','smtpSecure','mailFrom'].forEach(id=>document.addEventListener('input',e=>{if(e.target.id===id) renderPreview();}));
saveBtn.onclick=save;load();
</script></body></html>
