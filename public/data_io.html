<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>資料匯入匯出｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/forms-template.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML = shell('系統設定 / 資料匯入匯出', `
<div class="cards">
  ${[
    ['clients','客戶資料','/api/export/clients','/api/import/clients'],
    ['suppliers','供應商','/api/export/suppliers','/api/import/suppliers'],
    ['equipment','設備','/api/export/equipment','/api/import/equipment'],
    ['quotes','報價單','/api/export/quotes','/api/import/quotes'],
    ['contracts','維護合約單','/api/export/contracts','/api/import/contracts'],
    ['acceptances','驗收單','/api/export/acceptances','/api/import/acceptances'],
    ['purchases','進貨單','/api/export/purchases','/api/import/purchases']
  ].map(([key,title,exp,imp])=>`
    <div class="card">
      <h3>${title}</h3>
      <p>可匯出 Excel，也可從 Excel 匯入。</p>
      <div class="toolbar"><button onclick="downloadFile('${exp}', '${key}.xlsx')">匯出 Excel</button></div>
      <div class="toolbar" style="margin-top:8px;">
        <input type="file" id="file_${key}" accept=".xlsx,.xls">
        <button class="light" onclick="uploadExcel('${imp}', document.getElementById('file_${key}'))">匯入 Excel</button>
      </div>
    </div>`).join('')}
</div>
<div class="card" style="margin-top:16px">
  <h3>完整資料庫備份</h3>
  <p>將整個系統主要資料表匯出為 JSON 備份檔，或將備份檔完整匯回資料庫。</p>
  <div class="toolbar">
    <button onclick="exportFull()">完整資料備份匯出</button>
    <input type="file" id="full_backup_file" accept=".json">
    <button class="light" onclick="importFullBackup()">匯入完整備份</button>
  </div>
  <div class="hint">注意：匯入完整備份會覆蓋目前主要資料表內容，建議先匯出保存。</div>
</div>
<div class="card" style="margin-top:16px">
  <h3>原生資料庫備份</h3>
  <p>使用 PostgreSQL 原生工具 pg_dump / psql 進行整庫 SQL 備份與還原。</p>
  <div class="toolbar">
    <button onclick="checkNativeBackup()">檢查原生工具</button>
    <button onclick="API.exportNativeBackup()">匯出原生 SQL 備份</button>
    <input type="file" id="native_backup_file" accept=".sql,.txt">
    <button class="light" onclick="importNativeBackup()">匯入原生 SQL 備份</button>
  </div>
  <div class="hint" id="native_backup_hint">若 Render / 部署環境未安裝 pg_dump 與 psql，請改用上方完整 JSON 備份。</div>
</div>
<div class="info-box" style="margin-top:16px;">所有匯出都已改成帶登入授權下載，不再跳出 unauthorized。</div>`);
async function importFullBackup(){
  try{
    const f = document.getElementById('full_backup_file').files[0];
    if(!f) return alert('請先選擇完整備份檔');
    if(!confirm('匯入完整備份會覆蓋目前主要資料，確定繼續嗎？')) return;
    await API.importFullBackup(f);
    alert('完整備份已匯入');
  }catch(err){ alert('完整備份匯入失敗：' + err.message); }
}
async function checkNativeBackup(){
  try{
    const r = await API.nativeBackupCheck();
    document.getElementById('native_backup_hint').innerText = `pg_dump：${r.pg_dump ? '可用' : '不可用'}｜psql：${r.psql ? '可用' : '不可用'}${r.version ? '｜' + r.version : ''}`;
  }catch(err){ alert('檢查原生工具失敗：' + err.message); }
}
async function importNativeBackup(){
  try{
    const f = document.getElementById('native_backup_file').files[0];
    if(!f) return alert('請先選擇原生 SQL 備份檔');
    if(!confirm('匯入原生 SQL 備份可能覆蓋現有資料，確定繼續嗎？')) return;
    await API.importNativeBackup(f);
    alert('原生 SQL 備份已匯入');
  }catch(err){ alert('原生 SQL 備份匯入失敗：' + err.message); }
}

async function exportFull(){
  try{
    await API.exportFullBackup();
  }catch(err){
    alert('完整資料備份匯出失敗：' + err.message);
  }
}
</script></body></html>
