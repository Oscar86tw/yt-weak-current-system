<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>進貨查詢｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('進貨查詢',`<div class="list-panel"><div class="toolbar"><input id="search" placeholder="輸入單號 / 供應商 / 案場 / 報價單查詢"></div><div id="list"></div></div>`);
let rows=[];function groupByMonth(arr){const g={};arr.forEach(r=>{const d=((r.purchase_date||'').replaceAll('/','-').slice(0,7))||'未分類';(g[d] ||= []).push(r)});return g}
async function load(){rows=await API.listPurchases();render()}function render(){const k=search.value.trim().toLowerCase();const result=rows.filter(r=>`${r.purchase_no||''} ${r.supplier_name||''} ${r.site_name||''} ${r.quote_no||''}`.toLowerCase().includes(k)||!k);const groups=groupByMonth(result);list.innerHTML=Object.keys(groups).sort().reverse().map(month=>`<div class="list-item"><strong>${month}</strong>${groups[month].map(r=>`<div style="border-top:1px dashed #d1d5db;padding-top:10px;margin-top:10px;"><strong>${r.purchase_no||'未編號'}｜${r.supplier_name||'未指定供應商'}</strong><div>日期：${r.purchase_date||'—'}　案場：${r.site_name||'—'}</div><div>對應報價：${r.quote_no||'—'}　總額：NT$ ${money(r.total_amount||0)}</div><div>付款：${r.payment_status||'—'}　未付：NT$ ${money(r.remaining_amount||0)}</div><div class="toolbar"><a class="btn" href="/purchase.html?id=${r.id}">修改</a><button class="danger" onclick="removeRow(${r.id},'${(r.purchase_no||'').replace(/'/g,'')}')">刪除</button></div></div>`).join('')}</div>`).join('')||'<div class="muted">目前尚無進貨資料。</div>'}async function removeRow(id,no){if(!confirm(`確定刪除這份進貨單？\n${no}`))return;await API.deletePurchase(id);load()}search.oninput=render;load();
</script></body></html>
