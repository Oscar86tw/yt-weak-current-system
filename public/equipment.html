<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>иЁӯеӮҷпҪңжҳұжӢ“ејұйӣ»</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('иіҮж–ҷе»әз«Ӣ / иЁӯеӮҷ',`<div class="split"><div class="form-panel"><h2 style="margin-top:0;">иЁӯеӮҷиЎЁе–® <span class="badge" id="mode">ж–°еўһ</span></h2><div class="toolbar"><button class="light" onclick="downloadFile('/api/export/equipment')">еҢҜеҮә Excel</button><input type="file" id="excelFile" accept=".xlsx,.xls"><button class="light" onclick="doImport()">еҢҜе…Ҙ Excel</button></div><input type="hidden" id="docId"><div class="row3"><div><label>з·Ёиҷҹ</label><input id="code" readonly></div><div><label>йЎһеҲҘ</label><select id="category"></select></div><div><label>еҗҚзЁұ</label><input id="equipmentName"></div></div><label>иҰҸж ј</label><textarea id="spec"></textarea><div class="row"><div><label>жҲҗжң¬</label><input id="cost" value="0"></div><div><label>е”®еғ№</label><input id="price" value="0"></div></div><div class="row"><div><label>еҲ©жҪӨ</label><input id="profit" readonly></div><div><label>йҖЈзөҗ</label><input id="link"></div></div><label>еӮҷиЁ»</label><textarea id="note"></textarea><div class="toolbar"><button id="saveBtn">еӯҳжӘ”</button><button class="light" id="clearBtn">жё…з©ә</button></div></div><div class="list-panel"><div class="toolbar"><input id="search" placeholder="жҗңе°ӢиЁӯеӮҷ"></div><div id="list"></div></div></div>`);
let rows=[], cats=[]; async function doImport(){ try{ await uploadExcel('/api/import/equipment', excelFile); await load(); }catch(err){ alert('еҢҜе…ҘеӨұж•—пјҡ'+err.message); } }
function calc(){const c=Number(cost.value||0),p=Number(price.value||0);profit.value=money(p-c)}
function renderCat(){category.innerHTML='<option value="">и«ӢйҒёж“ҮйЎһеҲҘ</option>'+cats.map(c=>`<option value="${c.name}">${c.code}пҪң${c.name}</option>`).join('');}
function monthGroup(rows, renderFn){const groups={};rows.forEach(r=>{const d=(r.created_at||'').slice(0,7)||'жңӘеҲҶйЎһ';(groups[d]=groups[d]||[]).push(r)});return Object.keys(groups).sort().reverse().map(k=>`<div class="month-group"><div class="month-title">${k}</div>${groups[k].map(renderFn).join('')}</div>`).join('')}
async function load(){
  try{
    rows=await API.listEquipment();
    cats=await API.getEquipmentCategories();
    renderCat();
    if(!docId.value){
      const next=await API.nextNo('equipment');
      code.value=next.doc_no||'EQ0001';
    }
    render();
  }catch(err){alert('ијүе…ҘиЁӯеӮҷеӨұж•—пјҡ'+err.message)}
}
function render(){
  const k=search.value.trim().toLowerCase();
  const result=rows.filter(r=>`${r.code||''} ${r.name||''} ${r.spec||''} ${r.category||''}`.toLowerCase().includes(k)||!k);
  list.innerHTML=result.length?monthGroup(result,r=>`<div class="list-item"><strong>${r.code||'жңӘз·Ёиҷҹ'}пҪң${r.name}</strong><div>йЎһеҲҘпјҡ${r.category||'вҖ”'}гҖҖиҰҸж јпјҡ${r.spec||'вҖ”'}</div><div>жҲҗжң¬пјҡNT$ ${money(r.cost||0)}гҖҖе”®еғ№пјҡNT$ ${money(r.price||0)}гҖҖеҲ©жҪӨпјҡNT$ ${money(r.profit||0)}</div><div class="toolbar"><button onclick="editRow(${r.id})">дҝ®ж”№</button><button class="danger" onclick="removeRow(${r.id},'${(r.code||'').replace(/'/g,"\\'")}')">еҲӘйҷӨ</button></div></div>`):'<div class="muted">е°ҡз„ЎиЁӯеӮҷиіҮж–ҷ</div>';
}
function editRow(id){
  const r=rows.find(x=>x.id===id);if(!r)return;
  docId.value=r.id;code.value=r.code||'';category.value=r.category||'';equipmentName.value=r.name||'';spec.value=r.spec||'';cost.value=r.cost||0;price.value=r.price||0;link.value=r.link||'';note.value=r.note||'';calc();mode.textContent='дҝ®ж”№';
}
async function clearForm(){
  ['docId','spec','link','note'].forEach(id=>window[id].value='');
  equipmentName.value='';category.value='';cost.value='0';price.value='0';profit.value='0';mode.textContent='ж–°еўһ';
  const next=await API.nextNo('equipment');code.value=next.doc_no||'EQ0001';
}
async function save(){
  try{
    const p={code:code.value.trim(),category:category.value,name:equipmentName.value.trim(),spec:spec.value.trim(),cost:Number(cost.value||0),price:Number(price.value||0),note:note.value.trim(),link:link.value.trim()};
    if(!p.category)return alert('и«ӢйҒёж“ҮйЎһеҲҘ');
    if(!p.name)return alert('и«Ӣијёе…ҘиЁӯеӮҷеҗҚзЁұ');
    if(docId.value) await API.updateEquipment(docId.value,p); else await API.createEquipment(p);
    await clearForm();load();
  }catch(err){alert('иЁӯеӮҷеӯҳжӘ”еӨұж•—пјҡ'+err.message)}
}
async function removeRow(id,codeText){
  try{
    if(!confirm(`зўәе®ҡеҲӘйҷӨжӯӨиЁӯеӮҷиіҮж–ҷпјҹ\n${codeText}`))return;
    await API.deleteEquipment(id);await clearForm();load();
  }catch(err){alert('еҲӘйҷӨеӨұж•—пјҡ'+err.message)}
}
cost.oninput=calc;price.oninput=calc;saveBtn.onclick=save;clearBtn.onclick=clearForm;search.oninput=render;calc();load();
</script></body></html>
