<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>設備｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('設備管理',`<div class="split"><div class="form-panel"><h2 style="margin-top:0;">設備表單</h2><input type="hidden" id="docId"><div class="row3"><div><label>編號</label><input id="code" readonly></div><div><label>類別</label><select id="category"></select></div><div><label>名稱</label><input id="name"></div></div><label>規格</label><textarea id="spec"></textarea><div class="row"><div><label>成本</label><input id="cost" value="0"></div><div><label>售價</label><input id="price" value="0"></div></div><div class="row"><div><label>利潤</label><input id="profit" readonly></div><div><label>連結</label><input id="link"></div></div><label>備註</label><textarea id="note"></textarea><div class="toolbar"><button id="saveBtn">存檔</button><button class="light" id="clearBtn">清空</button></div></div><div class="list-panel"><div class="toolbar"><input id="search" placeholder="搜尋設備"></div><div id="list"></div></div></div>`);
let rows=[], settings={};function calc(){const c=Number(cost.value||0),p=Number(price.value||0);profit.value=money(p-c)}function renderCategories(){const cats=(settings.equipment_categories||'').split('\n').map(s=>s.trim()).filter(Boolean);category.innerHTML='<option value="">請選擇類別</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('')}async function newCode(){const n=await API.nextNo('equipment');code.value=n.doc_no}
async function load(){settings=await API.getSettings();rows=await API.listEquipment();renderCategories();await newCode();render()}function groupByMonth(arr){const g={};arr.forEach(r=>{const d=(r.created_at||'').slice(0,7)||'未分類';(g[d] ||= []).push(r)});return g}
function render(){const k=search.value.trim().toLowerCase();const result=rows.filter(r=>`${r.code||''} ${r.name||''} ${r.spec||''} ${r.category||''}`.toLowerCase().includes(k)||!k);const groups=groupByMonth(result);list.innerHTML=Object.keys(groups).sort().reverse().map(month=>`<div class="list-item"><strong>${month}</strong>${groups[month].map(r=>`<div style="border-top:1px dashed #d1d5db;padding-top:10px;margin-top:10px;"><strong>${r.code||'未編號'}｜${r.category||'未分類'}｜${r.name}</strong><div>規格：${r.spec||'—'}</div><div>成本：NT$ ${money(r.cost||0)}　售價：NT$ ${money(r.price||0)}　利潤：NT$ ${money(r.profit||0)}</div><div class="toolbar"><button onclick="editRow(${r.id})">修改</button><button class="danger" onclick="removeRow(${r.id})">刪除</button></div></div>`).join('')}</div>`).join('')||'<div class="muted">尚無資料</div>'}
function editRow(id){const r=rows.find(x=>x.id===id);docId.value=r.id;code.value=r.code||'';category.value=r.category||'';name.value=r.name||'';spec.value=r.spec||'';cost.value=r.cost||0;price.value=r.price||0;link.value=r.link||'';note.value=r.note||'';calc()}
async function clearForm(){['docId','name','spec','link','note'].forEach(id=>window[id].value='');cost.value='0';price.value='0';profit.value='0';category.value='';await newCode()}
async function save(){const p={code:code.value.trim(),category:category.value.trim(),name:name.value.trim(),spec:spec.value.trim(),cost:Number(cost.value||0),price:Number(price.value||0),note:note.value.trim(),link:link.value.trim()};if(!p.category)return alert('請選擇類別');if(!p.name)return alert('請輸入設備名稱');if(docId.value) await API.updateEquipment(docId.value,p); else await API.createEquipment(p);await clearForm();load()}
async function removeRow(id){if(!confirm('確定刪除此設備資料嗎？'))return;await API.deleteEquipment(id);load()}cost.oninput=calc;price.oninput=calc;saveBtn.onclick=save;clearBtn.onclick=clearForm;search.oninput=render;calc();load();
</script></body></html>
