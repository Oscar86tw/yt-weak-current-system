<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>設備｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('設備管理',`<div class="split"><div class="form-panel"><h2 style="margin-top:0;">設備表單 <span class="badge" id="mode">新增</span></h2><input type="hidden" id="docId"><div class="row"><div><label>編號</label><input id="code"></div><div><label>名稱</label><input id="name"></div></div><label>規格</label><textarea id="spec"></textarea><div class="row"><div><label>成本</label><input id="cost" value="0"></div><div><label>售價</label><input id="price" value="0"></div></div><div class="row"><div><label>利潤</label><input id="profit" readonly></div><div><label>連結</label><input id="link"></div></div><label>備註</label><textarea id="note"></textarea><div class="toolbar"><button id="saveBtn">新增 / 存檔</button><button class="light" id="clearBtn">清空</button></div></div><div class="list-panel"><div class="toolbar"><input id="search" placeholder="輸入編號 / 名稱 / 規格查詢"></div><div id="list"></div></div></div>`);
let rows=[];function calc(){const c=Number(cost.value||0),p=Number(price.value||0);profit.value=money(p-c)}async function load(){rows=await API.listEquipment();render()}function render(){const k=search.value.trim().toLowerCase();const result=rows.filter(r=>`${r.code||''} ${r.name||''} ${r.spec||''}`.toLowerCase().includes(k)||!k);list.innerHTML=result.length?result.map(r=>`<div class="list-item"><strong>${r.code||'未編號'}｜${r.name||'未命名設備'}</strong><div>規格：${r.spec||'—'}</div><div>成本：NT$ ${money(r.cost||0)}　售價：NT$ ${money(r.price||0)}　利潤：NT$ ${money(r.profit||0)}</div><div>連結：${r.link||'—'}</div><div>備註：${r.note||'—'}</div><div class="toolbar"><button onclick="editRow(${r.id})">修改</button><button class="danger" onclick="removeRow(${r.id})">刪除</button></div></div>`).join(''):'<div class="muted">目前尚無設備資料。</div>'}function editRow(id){const r=rows.find(x=>x.id===id);if(!r)return;docId.value=r.id;code.value=r.code||'';name.value=r.name||'';spec.value=r.spec||'';cost.value=r.cost||0;price.value=r.price||0;link.value=r.link||'';note.value=r.note||'';calc();mode.textContent='修改'}function clearForm(){['docId','code','name','spec','link','note'].forEach(id=>window[id].value='');cost.value='0';price.value='0';profit.value='0';mode.textContent='新增'}async function save(){const p={code:code.value.trim(),name:name.value.trim(),spec:spec.value.trim(),cost:Number(cost.value||0),price:Number(price.value||0),note:note.value.trim(),link:link.value.trim()};if(!p.name){alert('請輸入設備名稱');return}if(docId.value)await API.updateEquipment(docId.value,p);else await API.createEquipment(p);alert('設備資料已存檔');clearForm();await load()}async function removeRow(id){if(!confirm('確定刪除此設備資料嗎？'))return;await API.deleteEquipment(id);await load()}cost.addEventListener('input',calc);price.addEventListener('input',calc);saveBtn.addEventListener('click',save);clearBtn.addEventListener('click',clearForm);search.addEventListener('input',render);calc();load().catch(err=>alert(err.message));
</script></body></html>
