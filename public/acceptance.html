<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>驗收單｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
let clients=[],filtered=[];function fillCustomer(){const c=clients.find(x=>String(x.id)===String(customerSelect.value));if(!c)return;customerTaxId.value=c.tax_id||'';contactPerson.value=c.contact_person||'';contactPhone.value=c.phone||'';contactJobTitle.value=c.job_title||'';customerAddress.value=c.address||'';renderDoc()}function renderCustomerSelect(list){customerSelect.innerHTML='<option value="">請選擇客戶</option>'+list.map(c=>`<option value="${c.id}">${c.client_name}</option>`).join('');const preset=qs('clientId');if(preset&&list.some(c=>String(c.id)===String(preset))){customerSelect.value=preset;fillCustomer()}}function filterCustomers(){const k=customerSearch.value.trim().toLowerCase();filtered=clients.filter(c=>(c.client_name||'').toLowerCase().includes(k)||!k);renderCustomerSelect(filtered)}function summary(){const opt=customerSelect.options[customerSelect.selectedIndex];const customer=opt&&opt.value?opt.text:'未選擇客戶';return `【${COMPANY.name} 驗收單】\n單號：${docNo.value}\n客戶：${customer}\n聯絡人：${contactPerson.value||''}`}function renderDoc(){const opt=customerSelect.options[customerSelect.selectedIndex];const customer=opt&&opt.value?opt.text:'＿＿＿＿';preview.innerHTML=`<div class="doc-head"><div><h2>${COMPANY.name}</h2><div class="doc-sub">施工完成驗收單<br>電話：${COMPANY.phone}<br>地址：${COMPANY.address}</div></div><div class="doc-sub" style="text-align:right;">文件編號：${docNo.value||'＿＿＿＿'}<br>日期：${docDate.value||'＿＿＿＿'}<br>客戶：${customer}<br>客戶統編：${customerTaxId.value||'＿＿＿＿＿＿＿＿'}<br>聯絡人：${contactPerson.value||'＿＿＿＿'}<br>電話：${contactPhone.value||'＿＿＿＿'}</div></div><div class="block"><h3>通訊地址</h3><p>${nl2br(customerAddress.value||'＿＿＿＿＿＿＿＿＿＿')}</p></div><div class="block"><h3>驗收項目</h3><ol>${splitLines(content.value).map(x=>`<li>${x.replace(/^\d+\./,'').trim()}</li>`).join('')}</ol></div><div class="block"><h3>備註</h3><p>${nl2br(note.value)}</p></div><div class="block"><h3>驗收結論</h3><p>□ 驗收完成　　□ 待改善後複驗</p></div>`}async function saveDoc(){const p={doc_no:docNo.value,doc_date:docDate.value,client_id:customerSelect.value||null,contact_person:contactPerson.value||'',contact_phone:contactPhone.value||'',address:customerAddress.value||'',content:content.value||'',note:note.value||'',contact_job_title:contactJobTitle.value||'',customer_tax_id:customerTaxId.value||''};if(!p.client_id){alert('請先選擇客戶。');return}if(docId.value)await API.updateAcceptance(docId.value,p);else await API.createAcceptance(p);alert('驗收單已存檔')}async function sendPdf(){if(!sendToMail.value.trim()){alert('請輸入收件 Email');return}const res=await API.sendPdfMail({documentType:'acceptance',to:sendToMail.value.trim(),subject:'驗收單 '+docNo.value,memo:sendMemo.value||'',payload:{company:COMPANY,header:{docNo:docNo.value,docDate:docDate.value,customerName:customerSelect.options[customerSelect.selectedIndex]?.text||'',customerTaxId:customerTaxId.value,contactPerson:contactPerson.value,contactPhone:contactPhone.value,customerAddress:customerAddress.value},body:{content:content.value,note:note.value}}});alert(res.ok?'PDF 郵件已送出':(res.error||'寄送失敗'))}document.getElementById('app').innerHTML=shell('新增驗收單',`<div class="split"><div class="form-panel"><h2 style="margin-top:0;">驗收單表單 <span class="badge" id="mode">新增</span></h2><input type="hidden" id="docId"><div class="info-box">${COMPANY.name}<br>施工完成驗收單<br>電話：${COMPANY.phone}<br>地址：${COMPANY.address}</div><div class="row"><div><label>文件編號</label><input id="docNo" readonly></div><div><label>日期</label><input id="docDate" placeholder="例如：2026/03/29"></div></div><label>客戶搜尋</label><input id="customerSearch"><label>客戶名稱（下拉選單）</label><select id="customerSelect"></select><div class="row"><div><label>客戶統編</label><input id="customerTaxId" readonly></div><div><label>聯絡人</label><input id="contactPerson"></div></div><div class="row"><div><label>聯絡電話</label><input id="contactPhone"></div><div><label>職位</label><input id="contactJobTitle"></div></div><label>通訊地址</label><textarea id="customerAddress"></textarea><label>完成項目</label><textarea id="content">1. 設備安裝完成。\n2. 線路整理完成。\n3. 系統測試正常。\n4. 基本操作說明完成。</textarea><label>備註</label><textarea id="note">如後續發現非本次施工範圍之既有設備異常，將另行檢測與報價。</textarea><div class="row"><div><label>寄送 Email</label><input id="sendToMail"></div><div><label>寄件備註</label><input id="sendMemo"></div></div><div class="toolbar"><button id="saveBtn">存檔</button><button class="secondary" onclick="window.print()">一鍵匯出 PDF</button><button class="light" id="sendPdfBtn">附 PDF 寄 MAIL</button><button class="light" id="lineBtn">LINE 摘要</button><button class="light" id="mailBtn">MAIL 摘要</button></div></div><div class="preview-panel" id="preview"></div></div>`);async function init(){clients=await API.getClients();filtered=[...clients];renderCustomerSelect(clients);const next=await API.nextNo('acceptance');docNo.value=next.doc_no;['docNo','docDate','customerTaxId','contactPerson','contactPhone','contactJobTitle','customerAddress','content','note'].forEach(id=>document.getElementById(id).addEventListener('input',renderDoc));customerSearch.addEventListener('input',filterCustomers);customerSelect.addEventListener('change',fillCustomer);saveBtn.addEventListener('click',saveDoc);lineBtn.addEventListener('click',()=>shareToLine(summary()));mailBtn.addEventListener('click',()=>shareToMail('驗收單 '+docNo.value,summary()));sendPdfBtn.addEventListener('click',sendPdf);const id=qs('id');if(id){mode.textContent='修改';docId.value=id;const d=await API.getAcceptance(id);docNo.value=d.doc_no||'';docDate.value=d.doc_date||'';customerSelect.value=d.client_id?String(d.client_id):'';fillCustomer();content.value=d.content||'';note.value=d.note||'';contactJobTitle.value=d.contact_job_title||'';customerTaxId.value=d.customer_tax_id||customerTaxId.value;}renderDoc()}init().catch(err=>alert(err.message));
</script></body></html>
