<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>驗收單｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('新增驗收單',`<div class="split"><div class="form-panel"><h2 style="margin-top:0;">驗收單表單</h2><input type="hidden" id="docId"><div class="row"><div><label>文件編號</label><input id="docNo" readonly></div><div><label>日期</label><input id="docDate"></div></div><label>客戶</label><select id="clientSelect"></select><label>驗收內容</label><textarea id="content">1. 設備安裝完成。\n2. 線路整理完成。\n3. 系統測試正常。\n4. 基本操作說明完成。</textarea><label>備註</label><textarea id="note">如後續發現非本次施工範圍之既有設備異常，將另行檢測與報價。</textarea><div class="toolbar"><button id="saveBtn">存檔</button></div></div><div class="preview-panel" id="preview"></div></div>`);
let clients=[];function renderClientOptions(){clientSelect.innerHTML='<option value="">請選擇客戶</option>'+clients.map(c=>`<option value="${c.id}">${c.client_name}</option>`).join('')}
function renderDoc(){const c=clients.find(x=>String(x.id)===String(clientSelect.value));preview.innerHTML=`<div class="doc-head"><div><h2>${COMPANY.name}</h2><div class="doc-sub">施工完成驗收單<br>電話：${COMPANY.phone}<br>地址：${COMPANY.address}</div></div><div class="doc-sub" style="text-align:right;"><strong style="font-size:20px;color:#111827;">驗收單</strong><br><br>單號：${docNo.value||'＿＿＿＿'}<br>日期：${docDate.value||'＿＿＿＿'}<br>客戶：${c?.client_name||'＿＿＿＿'}</div></div><div class="block"><h3>驗收項目</h3><ol>${splitLines(content.value).map(x=>`<li>${x.replace(/^\d+\./,'').trim()}</li>`).join('')}</ol></div><div class="block"><h3>備註</h3><p>${nl2br(note.value)||'—'}</p></div>`}
async function saveDoc(){const p={doc_no:docNo.value,doc_date:docDate.value,client_id:clientSelect.value||null,content:content.value||'',note:note.value||''};if(!p.client_id)return alert('請先選擇客戶');if(docId.value) await API.updateAcceptance(docId.value,p); else await API.createAcceptance(p); alert('驗收單已存檔')}
async function init(){clients=await API.getClients();renderClientOptions();const next=await API.nextNo('acceptance');docNo.value=next.doc_no;['docDate','content','note'].forEach(id=>document.getElementById(id).addEventListener('input',renderDoc));clientSelect.onchange=renderDoc;saveBtn.onclick=saveDoc;const id=qs('id');if(id){docId.value=id;const d=await API.getAcceptance(id);docNo.value=d.doc_no||'';docDate.value=d.doc_date||'';clientSelect.value=d.client_id?String(d.client_id):'';content.value=d.content||'';note.value=d.note||'';}renderDoc()}init();
</script></body></html>
