<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>供應商｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('供應商管理',`<div class="split"><div class="form-panel"><h2 style="margin-top:0;">供應商表單</h2><input type="hidden" id="docId"><label>供應商名稱</label><input id="supplierName"><div class="row"><div><label>統一編號</label><input id="taxId"></div><div><label>聯絡電話</label><input id="phone"></div></div><div class="row"><div><label>聯絡人</label><input id="contact"></div><div><label>是否常用</label><select id="isFav"><option value="false">否</option><option value="true">是</option></select></div></div><label>地址</label><textarea id="address"></textarea><label>匯款帳號</label><textarea id="bankInfo"></textarea><label>備註</label><textarea id="note"></textarea><div class="toolbar"><button id="saveBtn">存檔</button><button class="light" id="clearBtn">清空</button></div></div><div class="list-panel"><div class="toolbar"><input id="search" placeholder="搜尋供應商"></div><div id="list"></div></div></div>`);
let rows=[];async function load(){rows=await API.getSuppliers();render()}function groupByMonth(arr){const g={};arr.forEach(r=>{const d=(r.created_at||'').slice(0,7)||'未分類';(g[d] ||= []).push(r)});return g}
function render(){const k=search.value.trim().toLowerCase();const result=rows.filter(r=>`${r.name||''} ${r.contact_person||''}`.toLowerCase().includes(k)||!k);const groups=groupByMonth(result);list.innerHTML=Object.keys(groups).sort().reverse().map(month=>`<div class="list-item"><strong>${month}</strong>${groups[month].map(r=>`<div style="border-top:1px dashed #d1d5db;padding-top:10px;margin-top:10px;"><strong>${r.name}${r.is_favorite?'　⭐':''}</strong><div>聯絡人：${r.contact_person||'—'}　電話：${r.phone||'—'}</div><div>地址：${r.address||'—'}</div><div>匯款：${r.bank_info||'—'}</div><div class="toolbar"><button onclick="editRow(${r.id})">修改</button><button class="danger" onclick="removeRow(${r.id},'${(r.name||'').replace(/'/g,'')}')">刪除</button></div></div>`).join('')}</div>`).join('')||'<div class="muted">尚無資料</div>'}function editRow(id){const r=rows.find(x=>x.id===id);docId.value=r.id;supplierName.value=r.name||'';taxId.value=r.tax_id||'';phone.value=r.phone||'';contact.value=r.contact_person||'';address.value=r.address||'';bankInfo.value=r.bank_info||'';note.value=r.note||'';isFav.value=String(!!r.is_favorite)}function clearForm(){['docId','supplierName','taxId','phone','contact','address','bankInfo','note'].forEach(id=>window[id].value='');isFav.value='false'}async function save(){const p={name:supplierName.value.trim(),tax_id:taxId.value.trim(),contact_person:contact.value.trim(),phone:phone.value.trim(),address:address.value.trim(),bank_info:bankInfo.value.trim(),note:note.value.trim(),is_favorite:isFav.value==='true'};if(!p.name)return alert('請輸入供應商名稱');if(docId.value) await API.updateSupplier(docId.value,p); else await API.createSupplier(p);clearForm();load()}async function removeRow(id,name){if(!confirm(`確定刪除此供應商？\n${name}`))return;await API.deleteSupplier(id);load()}saveBtn.onclick=save;clearBtn.onclick=clearForm;search.oninput=render;load();
</script></body></html>
