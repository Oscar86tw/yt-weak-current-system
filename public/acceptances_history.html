<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>驗收單查詢｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('驗收單查詢',`<div class="list-panel"><div class="toolbar"><input id="search" placeholder="輸入客戶 / 聯絡人查詢"></div><div id="list"></div></div>`);
let rows=[];async function load(){rows=await API.listAcceptances();render()}function render(){const k=search.value.trim().toLowerCase();const result=rows.filter(r=>`${r.doc_no||''} ${r.client_name||''} ${r.contact_person||''}`.toLowerCase().includes(k)||!k);list.innerHTML=result.length?result.map(r=>`<div class="list-item"><strong>${r.doc_no||'未編號'}｜${r.client_name||'未指定客戶'}</strong><div>聯絡人：${r.contact_person||'—'}</div><div>電話：${r.contact_phone||'—'}</div><div class="toolbar"><a class="btn" href="/acceptance.html?id=${r.id}">修改</a><button class="danger" onclick="removeRow(${r.id},'${(r.doc_no||'').replace(/'/g,'')}')">刪除</button></div></div>`).join(''):'<div class="muted">目前尚無資料。</div>'}async function removeRow(id,no){if(!confirm(`確定刪除這份驗收單？\n${no}`))return;await API.deleteAcceptance(id);await load()}search.addEventListener('input',render);load().catch(err=>alert(err.message));
</script></body></html>
