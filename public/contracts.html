<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>維護合約單｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
let clients=[],filtered=[];function fillCustomer(){const c=clients.find(x=>String(x.id)===String(customerSelect.value));if(!c)return;customerTaxId.value=c.tax_id||'';contactPerson.value=c.contact_person||'';contactPhone.value=c.phone||'';contactJobTitle.value=c.job_title||'';customerAddress.value=c.address||'';renderDoc()}function renderCustomerSelect(list){customerSelect.innerHTML='<option value="">請選擇客戶</option>'+list.map(c=>`<option value="${c.id}">${c.client_name}</option>`).join('');const preset=qs('clientId');if(preset&&list.some(c=>String(c.id)===String(preset))){customerSelect.value=preset;fillCustomer()}}function filterCustomers(){const k=customerSearch.value.trim().toLowerCase();filtered=clients.filter(c=>(c.client_name||'').toLowerCase().includes(k)||!k);renderCustomerSelect(filtered)}function summary(){const opt=customerSelect.options[customerSelect.selectedIndex];const customer=opt&&opt.value?opt.text:'未選擇客戶';return `【${COMPANY.name} 維護合約單】\n單號：${docNo.value}\n客戶：${customer}\n合約：${contractName.value}\n金額：NT$ ${money(amount.value||0)}`}function renderDoc(){const a=Number(amount.value||0),tax=Math.round(a*0.05),total=a+tax;const opt=customerSelect.options[customerSelect.selectedIndex];const customer=opt&&opt.value?opt.text:'＿＿＿＿';preview.innerHTML=`<div class="doc-head"><div><h2>${COMPANY.name}</h2><div class="doc-sub">${COMPANY.tag}<br>電話：${COMPANY.phone}<br>地址：${COMPANY.address}</div></div><div class="doc-sub" style="text-align:right;"><strong style="font-size:20px;color:#111827;">弱電系統維護合約單</strong><br><br>文件編號：${docNo.value||'＿＿＿＿'}<br>日期：${docDate.value||'＿＿＿＿'}<br>客戶：${customer}<br>客戶統編：${customerTaxId.value||'＿＿＿＿＿＿＿＿'}<br>聯絡人：${contactPerson.value||'＿＿＿＿'}<br>電話：${contactPhone.value||'＿＿＿＿'}</div></div><div class="block"><h3>通訊地址</h3><p>${nl2br(customerAddress.value||'＿＿＿＿＿＿＿＿＿＿')}</p></div><div class="block"><h3>合約名稱</h3><p>${contractName.value||'＿＿＿＿＿＿＿＿＿＿＿'}</p></div><div class="block"><h3>服務範圍</h3><p>${nl2br(scope.value)}</p></div><div class="block"><h3>巡檢頻率</h3><p>${frequency.value||'每月1次'}</p></div><div class="block"><h3>合約金額</h3><p>未稅：NT$ ${money(a)}<br>營業稅（5%）：NT$ ${money(tax)}<br><strong>含稅總額：NT$ ${money(total)}</strong></p></div><div class="block"><h3>合約條款</h3><ol>${splitLines(terms.value).map(x=>`<li>${x.replace(/^\d+\./,'').trim()}</li>`).join('')}</ol></div>`}async function saveDoc(){const p={doc_no:docNo.value,doc_date:docDate.value,client_id:customerSelect.value||null,contract_name:contractName.value||'',contact_person:contactPerson.value||'',contact_phone:contactPhone.value||'',address:customerAddress.value||'',scope:scope.value||'',frequency:frequency.value||'',amount:Number(amount.value||0),terms:terms.value||'',contact_job_title:contactJobTitle.value||'',customer_tax_id:customerTaxId.value||''};if(!p.client_id){alert('請先選擇客戶。');return}if(!p.contract_name){alert('請先輸入合約名稱。');return}if(docId.value)await API.updateContract(docId.value,p);else await API.createContract(p);alert('維護合約單已存檔')}async function sendPdf(){if(!sendToMail.value.trim()){alert('請輸入收件 Email');return}const res=await API.sendPdfMail({documentType:'contract',to:sendToMail.value.trim(),subject:'維護合約單 '+docNo.value,memo:sendMemo.value||'',payload:{company:COMPANY,header:{docNo:docNo.value,docDate:docDate.value,customerName:customerSelect.options[customerSelect.selectedIndex]?.text||'',customerTaxId:customerTaxId.value,contactPerson:contactPerson.value,contactPhone:contactPhone.value,contractName:contractName.value,customerAddress:customerAddress.value},body:{scope:scope.value,frequency:frequency.value,amount:amount.value,terms:terms.value}}});alert(res.ok?'PDF 郵件已送出':(res.error||'寄送失敗'))}document.getElementById('app').innerHTML=shell('新增維護合約單',`<div class="split"><div class="form-panel"><h2 style="margin-top:0;">維護合約單表單 <span class="badge" id="mode">新增</span></h2><input type="hidden" id="docId"><div class="info-box">${COMPANY.name}<br>${COMPANY.tag}<br>電話：${COMPANY.phone}<br>地址：${COMPANY.address}</div><div class="row"><div><label>文件編號</label><input id="docNo" readonly></div><div><label>日期</label><input id="docDate" placeholder="例如：2026/03/29"></div></div><label>客戶搜尋</label><input id="customerSearch"><label>客戶名稱（下拉選單）</label><select id="customerSelect"></select><div class="row"><div><label>客戶統編</label><input id="customerTaxId" readonly></div><div><label>聯絡人</label><input id="contactPerson"></div></div><div class="row"><div><label>聯絡電話</label><input id="contactPhone"></div><div><label>職位</label><input id="contactJobTitle"></div></div><label>通訊地址</label><textarea id="customerAddress"></textarea><label>合約名稱</label><input id="contractName"><label>服務範圍</label><textarea id="scope">門禁管制系統、對講機系統、數位監視系統、車道停管系統、BA中央監控系統、共同天線系統。</textarea><div class="row"><div><label>巡檢頻率</label><input id="frequency" value="每月1次"></div><div><label>合約金額（未稅）</label><input id="amount" value="4280"></div></div><label>合約條款</label><textarea id="terms">1. 本合約為年度保養合約，每月執行一次例行性巡檢保養。\n2. 本報價僅包含定期保養檢測工資，若檢測發現設備故障需更換耗材或零件，材料費另行報價。\n3. 合約期間內享有叫修優先服務權，緊急叫修回應時間為6小時內。\n4. 保養完成並交付保養報告書後，請於次月10日前以匯款或支票支付。\n5. 施工期間請貴單位協助配合進出管制與電源開關事宜。</textarea><div class="row"><div><label>寄送 Email</label><input id="sendToMail"></div><div><label>寄件備註</label><input id="sendMemo"></div></div><div class="toolbar"><button id="saveBtn">存檔</button><button class="secondary" onclick="window.print()">一鍵匯出 PDF</button><button class="light" id="sendPdfBtn">附 PDF 寄 MAIL</button><button class="light" id="lineBtn">LINE 摘要</button><button class="light" id="mailBtn">MAIL 摘要</button></div></div><div class="preview-panel" id="preview"></div></div>`);async function init(){clients=await API.getClients();filtered=[...clients];renderCustomerSelect(clients);const next=await API.nextNo('contract');docNo.value=next.doc_no;['docNo','docDate','customerTaxId','contactPerson','contactPhone','contactJobTitle','customerAddress','contractName','scope','frequency','amount','terms'].forEach(id=>document.getElementById(id).addEventListener('input',renderDoc));customerSearch.addEventListener('input',filterCustomers);customerSelect.addEventListener('change',fillCustomer);saveBtn.addEventListener('click',saveDoc);lineBtn.addEventListener('click',()=>shareToLine(summary()));mailBtn.addEventListener('click',()=>shareToMail('維護合約單 '+docNo.value,summary()));sendPdfBtn.addEventListener('click',sendPdf);const id=qs('id');if(id){mode.textContent='修改';docId.value=id;const d=await API.getContract(id);docNo.value=d.doc_no||'';docDate.value=d.doc_date||'';customerSelect.value=d.client_id?String(d.client_id):'';fillCustomer();contractName.value=d.contract_name||'';scope.value=d.scope||'';frequency.value=d.frequency||'';amount.value=d.amount||0;terms.value=d.terms||'';contactJobTitle.value=d.contact_job_title||'';customerTaxId.value=d.customer_tax_id||customerTaxId.value;}renderDoc()}init().catch(err=>alert(err.message));
</script></body></html>
