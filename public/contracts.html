<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>弱電系統維護保養報價單｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/forms-template.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML = shell('資料建立 / 維護保養報價單 / 新增', `<div class="form-wrap">
  <div class="form-topbar">
    <div class="form-brand">
      <h1>昱拓弱電有限公司｜V3.14.6G 表單修正版</h1>
      <p>資料建立 / 維護保養報價單 / 新增</p>
    </div>
    <div class="form-actions no-print" id="topActions"></div>
  </div>
  <div class="form-grid">
    <div class="form-panel" id="leftPanel"></div>
    <div class="form-preview pdf-like" id="preview"></div>
  </div>
</div>`);

const state = { id: qs('id') || '' };
let clients = [];
let refs = {};

function today(){ return new Date().toISOString().slice(0,10); }
function exportState(){
  const blob = new Blob([JSON.stringify(collect(), null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'maintenance-quotation-form.json';
  a.click();
}
function importState(el){
  const f = el.files && el.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    window._formLoad = JSON.parse(r.result);
    renderForm();
    renderPreview();
  };
  r.readAsText(f,'utf-8');
}
function quoteApprovalTemplates(){
  return {
    maintenance: `為維持本案場弱電系統設備正常運作，並建立後續定期巡檢、保養維護及故障叫修之作業依據，擬依本次維護保養報價內容辦理正式保養合約製作。俟業主確認同意後，據以進行後續合約簽訂及維護服務執行。`,
    community: `本案為社區弱電系統維護保養報價案件，維護範圍包含門禁、對講、監視、車道停管、BA中央監控及共同天線等設備之定期巡檢與保養。擬於業主確認報價內容後，續行製作並簽訂正式維護保養合約，以利後續維護作業及叫修服務之執行。`,
    repair: `本案為弱電設備維護及查修性質之報價案件，擬依現場實際設備狀況與報價內容辦理後續作業。倘業主確認同意本報價內容，將據以安排後續維護、修繕或相關合約製作事宜。`,
    custom: ``
  };
}
function applyApprovalTemplate(){
  const key = refs.approval_template.value;
  const templates = quoteApprovalTemplates();
  if(key === 'custom') return;
  refs.approval_note.value = templates[key] || '';
  renderPreview();
}
function defaultItems(){
  return `1|門禁管制系統|讀卡機感應測試與清潔\n電鎖吸力測試與校正\n外出開關接點檢測\n門禁軟體連線狀態檢查與備份\n緊急開門按鈕測試| | |
2|對講機系統|門口機影像與通話測試\n室內機訊號傳輸檢測\n管理室總機呼叫迴路測試\n電源供應器電壓檢測\n線路端子鎖固檢查| | |
3|數位監視系統|攝影機鏡頭清潔與角度調整\nDVR/NVR 主機錄影回放測試\n硬碟健康狀態掃描\n變壓器供電檢測| | |
4|車道停管系統|柵欄機升降動作測試與潤滑\neTag/車牌辨識讀取率測試\n感應線圈/紅外線防壓裝置測試\n號誌燈與顯示屏功能檢查\n手動/自動切換功能測試| | |
5|BA中央監控系統|圖控電腦運作狀態檢查\n各類感知器(水位/照明/排風)訊號測試\nDDC控制器通訊測試\n歷史警報紀錄分析\n系統備用電源測試| | |
6|共同天線系統|數位電視訊號強度db值檢測\n放大器增益調整\n分配器與線路接點檢查\n頂樓天線固定架構檢查| | |
7|故障叫修服務|經業主電話通知後，將於隔日(上班日)到達| | |`;
}
function defaultTerms(){
  return `合約期限：本合約為年度保養合約，每月執行一次例行性巡檢保養（依雙方議定為準）。
維修更換：本報價僅包含定期保養檢測工資，若檢測發現設備故障需更換耗材或零件，材料費另行報價。
緊急叫修：合約期間內享有叫修優先服務權，緊急叫修回應時間為 6 小時內。
付款方式：保養完成並交付保養報告書後，請於次月 10 日前以匯款或支票支付。
匯款資訊：昱拓弱電有限公司 / 銀行代碼：
工作配合：施工期間請貴單位協助配合進出管制與電源開關事宜。`;
}
function parseItems(raw){
  return (raw || '').split(/\n(?=\d+\|)/).map(row => {
    const parts = row.split('|');
    return { no: parts[0]||'', category: parts[1]||'', spec: parts[2]||'', check: parts[3]||'', status: parts[4]||'', note: parts[5]||'' };
  }).filter(x => x.no || x.category || x.spec);
}
function getClient(){ return clients.find(x => String(x.id) === String(refs.client_id.value)); }
function initRefs(){
  ['doc_no','doc_date','client_id','contact_person','address','phone','valid_days','contract_name','site_name','inspect_date','frequency','subtotal','tax','total','items_text','terms','approval_note','customer_agreed','approval_template'].forEach(id => refs[id] = document.getElementById(id));
}
function recalcTotals(){
  const subtotal = Number(refs.subtotal.value || 0);
  const tax = Math.round(subtotal * 0.05);
  refs.tax.value = tax;
  refs.total.value = subtotal + tax;
}
function collect(){
  return {
    doc_no: refs.doc_no.value,
    doc_date: refs.doc_date.value,
    client_id: refs.client_id.value || null,
    contact_person: refs.contact_person.value,
    address: refs.address.value,
    phone: refs.phone.value,
    valid_days: refs.valid_days.value,
    contract_name: refs.contract_name.value,
    site_name: refs.site_name.value,
    inspect_date: refs.inspect_date.value,
    frequency: refs.frequency.value,
    subtotal: Number(refs.subtotal.value||0),
    tax: Number(refs.tax.value||0),
    amount: Number(refs.total.value||0),
    total: Number(refs.total.value||0),
    items_text: refs.items_text.value,
    terms: refs.terms.value,
    approval_note: refs.approval_note.value,
    customer_agreed: refs.customer_agreed.checked ? 'Y' : 'N',
    approval_template: refs.approval_template.value,
    contract_kind: 'maintenance_quote'
  };
}
function bindBase(){
  const d = window._formLoad || {};
  refs.doc_no.value = d.doc_no || '';
  refs.doc_date.value = d.doc_date || today();
  refs.client_id.value = d.client_id ? String(d.client_id) : '';
  refs.contact_person.value = d.contact_person || '總幹事';
  refs.address.value = d.address || '';
  refs.phone.value = d.phone || '';
  refs.valid_days.value = d.valid_days || '30';
  refs.contract_name.value = d.contract_name || '弱電系統維護保養 報價單';
  refs.site_name.value = d.site_name || '';
  refs.inspect_date.value = d.inspect_date || '';
  refs.frequency.value = d.frequency || '每月1次';
  refs.subtotal.value = d.subtotal || 0;
  refs.tax.value = d.tax || 0;
  refs.total.value = d.total || d.amount || 0;
  refs.items_text.value = d.items_text || defaultItems();
  refs.terms.value = d.terms || defaultTerms();
  refs.approval_note.value = d.approval_note || quoteApprovalTemplates().maintenance;
  refs.customer_agreed.checked = d.customer_agreed === 'Y';
  refs.approval_template.value = d.approval_template || 'maintenance';
}
function fillClient(){
  const c = getClient();
  if(!c) return;
  refs.address.value = c.address || '';
  refs.phone.value = c.phone || c.contact_phone || '';
  refs.contact_person.value = c.contact_person || c.contact_name || c.contact || '總幹事';
  if(!refs.site_name.value.trim()) refs.site_name.value = c.client_name || '';
  renderPreview();
}
function renderForm(){
  topActions.innerHTML = `<button onclick="saveDoc()" id="btn-save">儲存到系統</button><button class="secondary" onclick="window.print()">列印 / 另存 PDF</button><button class="light" onclick="exportState()">匯出資料</button><label class="light" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;">匯入資料<input type="file" accept=".json" style="display:none" onchange="importState(this)"></label><button class="light" onclick="clearForm()">清空</button><button class="light" onclick="goFormalContract()">一鍵轉正式維護合約單</button>`;
  leftPanel.innerHTML = `<div class="form-section-title">基本資料</div>
<label>單號</label><input id="doc_no">
<div class="form-row"><div><label>報價日期</label><input id="doc_date" type="date"></div><div><label>社區名稱</label><select id="client_id"><option value="">請選擇客戶</option>${clients.map(c=>`<option value="${c.id}">${c.client_name}</option>`).join('')}</select></div></div>
<div class="form-row"><div><label>聯絡人</label><input id="contact_person" readonly style="background:#f5f7fb;"></div><div><label>電話</label><input id="phone" readonly style="background:#f5f7fb;"></div></div>
<label>地址</label><input id="address" readonly style="background:#f5f7fb;">
<div class="form-row"><div><label>有效期限（天）</label><input id="valid_days" type="number"></div><div><label>工程案名</label><input id="site_name"></div></div>
<div class="form-row"><div><label>點檢日期</label><input id="inspect_date" type="date"></div><div><label>維護頻率</label><input id="frequency"></div></div>
<div class="form-row"><div><label>未稅金額</label><input id="subtotal" type="number"></div><div><label>營業稅</label><input id="tax" type="number" readonly style="background:#f5f7fb;"></div></div>
<div class="form-row"><div><label>含稅總額</label><input id="total" type="number" readonly style="background:#f5f7fb;"></div><div><label style="display:flex;align-items:center;gap:8px;margin-top:30px;"><input id="customer_agreed" type="checkbox"> 客戶已同意，可後續簽正式合約</label></div></div>
<label>點檢項目（格式：編號|系統類別|規格摘要|點檢|狀況|備註）</label><textarea id="items_text" rows="12"></textarea>
<label>簽呈範本</label><select id="approval_template"><option value="maintenance">維護保養版</option><option value="community">社區版</option><option value="repair">單次查修版</option><option value="custom">自訂內容</option></select>
<label>簽呈</label><textarea id="approval_note" rows="4"></textarea>
<label>報價條款與備註</label><textarea id="terms" rows="8"></textarea>
<div id="lock-tip" class="hint" style="display:none;background:#eef6ff;border:1px solid #bfdbfe;color:#1e3a8a;">本筆維護保養報價單已存檔，欄位已自動鎖定。此頁僅保留重新列印、返回清單與一鍵轉正式維護合約單功能。</div>
<div class="hint">選取社區名稱後，聯絡人、電話、地址會由客戶資料自動帶入。未稅金額輸入後，營業稅與含稅總額會自動計算。</div>`;
  initRefs();
  bindBase();
  Object.values(refs).forEach(el => {
    if (!el) return;
    const evt = el.type === 'checkbox' || el.tagName === 'SELECT' ? 'change' : 'input';
    el.addEventListener(evt, renderPreview);
  });
  refs.client_id.addEventListener('change', fillClient);
  refs.approval_template.addEventListener('change', applyApprovalTemplate);
  refs.subtotal.addEventListener('input', () => { recalcTotals(); renderPreview(); });
  if (refs.client_id.value) fillClient();
  recalcTotals();
  renderPreview();
}
function renderPreview(){
  const d = collect();
  const c = getClient();
  document.getElementById('preview').innerHTML = `<div class="pdf-sheet">
    <div class="pdf-title">弱電系統維護保養 報價單</div>
    <div class="pdf-company">昱拓弱電有限公司</div>
    <div class="pdf-section">一、 公設弱電設備定期檢測維護</div>
    <div class="pdf-section">二、 總結報價</div>
    <div class="pdf-header-grid">
      <div>客戶名稱： ${c?.client_name || ''}</div>
      <div>聯絡人： ${d.contact_person || ''}</div>
      <div>地址： ${d.address || ''}</div>
      <div>電話： ${d.phone || ''}</div>
      <div>報價日期： ${d.doc_date || ''}</div>
      <div>有效期限： ${d.valid_days || ''}天</div>
    </div>
    <div class="pdf-quote-box">
      <div>昱拓弱電有限公司 - 弱電系統完工點檢清單</div>
      <div>330桃園市桃園區文中二路71號</div>
      <div class="money-line">本案總計金額 (不含稅)： <strong>NT$ ${money(d.subtotal || 0)} 元</strong></div>
      <div class="money-line">營業稅 (5%)： <strong>NT$ ${money(d.tax || 0)} 元</strong></div>
      <div class="money-line">總計應付金額 (含稅)： <strong>NT$ ${money(d.total || 0)} 元</strong></div>
      <div class="money-line">工程案名： ${d.site_name || '____________________'}</div>
      <div class="money-line">點檢日期： ${d.inspect_date || '____年____月____日'}</div>
      <div class="money-line">${d.frequency || ''}</div>
    </div>
    <table class="pdf-table">
      <thead><tr><th style="width:6%">項目</th><th style="width:18%">系統類別</th><th>規格摘要</th><th style="width:10%">點檢</th><th style="width:10%">狀況</th><th style="width:12%">備註</th></tr></thead>
      <tbody>${parseItems(d.items_text).map(r => `<tr><td>${r.no}</td><td>${r.category}</td><td>${(r.spec || '').replace(/\n/g,'<br>')}</td><td>${r.check || ''}</td><td>${r.status || ''}</td><td>${r.note || ''}</td></tr>`).join('')}</tbody>
    </table>
    <div class="pdf-terms-title">報價條款與備註</div>
    <div class="pdf-terms">${(d.terms || '').replace(/\n/g,'<br>')}</div>
    <div class="pdf-sign-grid">
      <div class="pdf-sign-box"><div class="sign-company-title">客戶簽署確認</div><div class="sign-space"></div><div>____________________</div><div>(簽章)</div><div>日期：_____年_____月_____日</div></div>
      <div class="pdf-sign-box"><div class="sign-company-title">昱拓弱電有限公司</div><div class="sign-space"></div><div>____________________</div><div>(公司印鑑)</div><div>統一編號：62220958</div><div>聯絡地址：桃園市中壢區榮安一街490號13樓</div></div>
    </div>
    <div class="pdf-approval"><strong>簽呈：</strong><br>${(d.approval_note || '—').replace(/\n/g,'<br>')}<br><br><strong>後續簽約狀態：</strong>${d.customer_agreed === 'Y' ? '客戶已同意，可後續簽正式維護合約單。' : '本單僅為維護保養報價單，尚未進入正式合約階段。'}</div>
  </div>`;
}
async function saveDoc(){
  const d = collect();
  if(!d.client_id) return alert('請先選擇社區名稱');
  try{
    const r = state.id ? await API.updateContract(state.id, d) : await API.createContract(d);
    if(r && r.id){
      alert('維護保養報價單已存檔，將自動跳轉正式列印頁。');
      location.href = '/contracts.html?id=' + r.id + '&autoprint=1&locked=1';
      return;
    }
    alert('存檔失敗，未取得文件編號。');
  }catch(err){
    alert('存檔失敗：' + (err.message || err));
  }
}
function clearForm(){ window._formLoad = {doc_no:'', doc_date:today(), subtotal:0, tax:0, total:0}; renderForm(); }
function lockSavedForm(){
  ['doc_date','client_id','valid_days','site_name','inspect_date','frequency','subtotal','items_text','terms','approval_note','customer_agreed','approval_template'].forEach(id => {
    const el = document.getElementById(id);
    if(!el) return;
    el.disabled = true;
    el.readOnly = true;
    el.style.background = '#f5f7fb';
    el.style.cursor = 'not-allowed';
  });
  const tip = document.getElementById('lock-tip');
  if(tip) tip.style.display = 'block';
}
async function goFormalContract(){
  if(!refs.customer_agreed.checked){ alert('請先勾選「客戶已同意，可後續簽正式合約」。'); return; }
  localStorage.setItem('maintenance_quote_to_contract', JSON.stringify(collect()));
  location.href = '/maintenance_contract_formal.html?fromQuote=1';
}
(async()=>{
  clients = await API.getClients();
  const next = await API.nextNo('contract');
  window._formLoad = {doc_no:next.doc_no, doc_date:today(), subtotal:0, tax:0, total:0};
  if(state.id){
    try{
      const d = await API.getContract(state.id);
      window._formLoad = d || window._formLoad;
    }catch(e){}
  }
  renderForm();
  if ((qs('locked') || '') === '1') lockSavedForm();
  if ((qs('autoprint') || '') === '1') setTimeout(() => window.print(), 500);
})();
</script></body></html>
