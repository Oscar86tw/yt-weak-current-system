<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>維護保養報價單｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/forms-template.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML = shell('資料建立 / 維護保養報價單 / 新增', `<div class="form-wrap">
  <div class="form-topbar">
    <div class="form-brand">
      <h1>昱拓弱電有限公司｜V3.14.6A 維護保養報價單獨立版</h1>
      <p>資料建立 / 維護保養報價單 / 新增</p>
    </div>
    <div class="form-actions no-print" id="topActions"></div>
  </div>
  <div class="form-grid">
    <div class="form-panel" id="leftPanel"></div>
    <div class="form-preview" id="preview"></div>
  </div>
</div>`);

const state = { id: qs('id') || '' };
let clients = [];


function today(){ return new Date().toISOString().slice(0,10); }
function exportState(){ const blob = new Blob([JSON.stringify(collect(), null, 2)], {type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='maintenance-contract-form.json'; a.click(); }
function importState(el){ const f=el.files&&el.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ window._formLoad=JSON.parse(r.result); renderForm(); renderPreview(); }; r.readAsText(f,'utf-8'); }

function defaultTerms(){
  return `1. 本合約為年度系統維護保養合約，每月執行一次例行性巡檢保養。
2. 本合約僅包含定期保養檢測工資；如檢測發現設備故障需更換耗材或零件，材料費另行報價。
3. 合約期間內享有叫修優先服務權，緊急叫修回應時間以雙方約定或實際可進場時間為準。
4. 保養完成並交付保養報告書後，請於次月10日前以匯款或支票支付。
5. 施工或維護期間，請業主協助配合進出管制與電源開關事宜。`;
}

function collect(){
  return {
    doc_no: doc_no.value,
    doc_date: doc_date.value,
    client_id: client_id.value || null,
    contract_name: contract_name.value,
    scope: scope.value,
    frequency: frequency.value,
    amount: Number(amount.value||0),
    terms: terms.value,
    approval_note: approval_note.value,
    customer_agreed: customer_agreed.checked ? 'Y' : 'N'
  };
}

function bindBase(){
  const d = window._formLoad || {};
  doc_no.value = d.doc_no || '';
  doc_date.value = d.doc_date || today();
  client_id.value = d.client_id ? String(d.client_id) : '';
  contract_name.value = d.contract_name || '';
  scope.value = d.scope || '';
  frequency.value = d.frequency || '每月設備檢測 1 次';
  amount.value = d.amount || 0;
  terms.value = d.terms || defaultTerms();
  approval_note.value = d.approval_note || '';
}

function fillTemplate(){
  if(!scope.value.trim()){
    scope.value = `一、公設弱電設備定期檢測維護
二、維護項目：
1. 門禁管制系統
2. 對講機系統
3. 數位監視系統
4. 車道停管系統
5. BA中央監控系統
6. 共同天線系統`;
  }
  if(!contract_name.value.trim()){
    contract_name.value = '弱電系統維護保養報價單';
  }
  if(!approval_note.value.trim()){
    approval_note.value = '本單為維護保養專用之獨立報價單；如業主確認同意後，再另行建立正式維護合約單。';
  }
  renderPreview();
}

function renderForm(){
  topActions.innerHTML=`<button id="btn-save" onclick="saveDoc()">儲存到系統</button><button id="btn-print" class="secondary" onclick="window.print()">重新列印</button><button id="btn-back" class="light" onclick="location.href='/contracts_history.html'">返回清單</button><button id="btn-export" class="light" onclick="exportState()">匯出資料</button><label id="btn-import-wrap" class="light" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;">匯入資料<input type="file" accept=".json" style="display:none" onchange="importState(this)"></label><button id="btn-clear" class="light" onclick="clearForm()">清空</button>`;

  leftPanel.innerHTML=`<div class="form-section-title">基本資料</div>
<label>單號</label><input id="doc_no">
<div class="form-row"><div><label>日期</label><input id="doc_date" type="date"></div><div><label>客戶</label><select id="client_id"><option value="">請選擇客戶</option>${clients.map(c=>`<option value="${c.id}">${c.client_name}</option>`).join('')}</select></div></div>
<label>報價名稱</label><input id="contract_name" placeholder="例如：弱電系統維護保養報價單">
<label>維護範圍</label><textarea id="scope" rows="8"></textarea>
<div class="form-row"><div><label>維護頻率</label><input id="frequency" placeholder="例如：每月設備檢測 1 次"></div><div><label>報價金額</label><input id="amount" type="number"></div></div>
<label>簽呈</label><textarea id="approval_note" rows="4" placeholder="內部簽呈或業主同意後續簽約說明"></textarea>
<div class="form-row"><div><label style="display:flex;align-items:center;gap:8px;"><input id="customer_agreed" type="checkbox"> 業主已同意，可後續簽正式合約</label></div><div><button type="button" class="light" onclick="fillTemplate()">帶入維護保養範本</button></div></div>
<label>報價條款</label><textarea id="terms" rows="8"></textarea>
<div class="hint">這是維護保養專用的獨立報價單，與一般報價單不關聯。只有客戶同意後，才再建立後續正式合約單。</div>
<div id="lock-tip" class="hint" style="margin-top:10px;display:none;background:#eef6ff;border:1px solid #bfdbfe;color:#1e3a8a;">本筆維護保養報價單已存檔，欄位已自動鎖定。此頁僅保留重新列印與返回清單功能。</div>`;

  bindBase();
  ['doc_no','doc_date','client_id','contract_name','scope','frequency','amount','terms','approval_note','customer_agreed'].forEach(id=>{
    document.getElementById(id).addEventListener('input', renderPreview);
    document.getElementById(id).addEventListener('change', renderPreview);
  });
  renderPreview();
}

function renderPreview(){
  const d=collect();
  const c=clients.find(x=>String(x.id)===String(d.client_id));
  
  preview.innerHTML=`
<div class="doc-head"><div><h2>昱拓弱電有限公司</h2><div class="doc-sub">弱電系統維護保養合約書<br>電話：0960-770-512<br>地址：桃園市中壢區榮安一街490號13樓</div></div>
<div class="doc-sub" style="text-align:right;"><strong style="font-size:20px;color:#111827;">維護保養報價單</strong><br><br>單號：${d.doc_no || '＿＿＿＿'}<br>日期：${d.doc_date || '＿＿＿＿'}<br>客戶：${c?.client_name || '＿＿＿＿'}<br>客戶狀態：${d.customer_agreed==='Y' ? '已同意，可後續簽約' : '尚未簽正式合約'}</div></div>
<div class="block"><h3>合約名稱</h3><p>${d.contract_name || '—'}</p></div>
<div class="block"><h3>維護範圍</h3><p>${(d.scope||'—').replace(/\n/g,'<br>')}</p></div>
<div class="block"><h3>維護頻率與金額</h3><p>維護頻率：${d.frequency || '—'}<br>合約金額：NT$ ${Number(d.amount||0).toLocaleString('zh-TW')}</p></div>
<div class="block"><h3>簽呈</h3><p>${(d.approval_note||'—').replace(/\n/g,'<br>')}</p></div>
<div class="block"><h3>後續簽約狀態</h3><p>${d.customer_agreed==='Y' ? '業主已同意，可後續建立正式維護合約單。' : '本單為獨立維護保養報價單，尚未進入正式合約階段。'}</p></div>
<div class="block"><h3>報價條款</h3><ol>${(d.terms||'').split(/\n+/).filter(Boolean).map(x=>`<li>${x.replace(/^\d+\./,'').trim()}</li>`).join('')}</ol></div>
<div class="sign-grid"><div class="sign-box">客戶簽章：</div><div class="sign-box">公司簽章：</div></div><div class="footer-note">維護保養報價單列印版</div>`;
}

async function saveDoc(){
  const d=collect();
  if(!d.client_id) return alert('請選擇客戶');
  let r;
  if(state.id) r=await API.updateContract(state.id,d);
  else r=await API.createContract(d);
  if(r.id){
    alert('維護保養報價單已存檔，將自動跳轉正式列印頁。');
    location.href='/contracts.html?id='+r.id+'&autoprint=1&locked=1';
    return;
  }
  alert('維護保養報價單已存檔');
}
function clearForm(){ window._formLoad = {}; renderForm(); }
function lockSavedForm(){
  ['doc_date','client_id','quote_id','contract_name','scope','frequency','amount','terms','approval_note'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el) return;
    el.disabled=true;
    el.readOnly=true;
    el.style.background='#f5f7fb';
    el.style.cursor='not-allowed';
  });
  ['btn-save','btn-export','btn-clear','btn-import-wrap'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.display='none';
  });
  const tip=document.getElementById('lock-tip');
  if(tip) tip.style.display='block';
}


(async()=>{
  clients=await API.getClients();
  const next=await API.nextNo('contract');
  window._formLoad={doc_no:next.doc_no,doc_date:today(),amount:0};
  if(state.id){
    const d=await API.getContract(state.id);
    window._formLoad=d;
  }
  renderForm();
  if (window._formLoad && window._formLoad.customer_agreed === 'Y') {
    const el = document.getElementById('customer_agreed');
    if (el) el.checked = true;
  }
  renderPreview();
  if ((qs('locked') || '') === '1') lockSavedForm();
  if ((qs('autoprint') || '') === '1') {
    setTimeout(()=>window.print(), 500);
  }
})();
</script></body></html>
