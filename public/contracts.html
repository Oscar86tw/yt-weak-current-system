<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>維護合約單｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('新增維護合約單',`<div class="split"><div class="form-panel"><h2 style="margin-top:0;">維護合約單表單</h2><input type="hidden" id="docId"><div class="row"><div><label>文件編號</label><input id="docNo" readonly></div><div><label>日期</label><input id="docDate"></div></div><label>客戶</label><select id="clientSelect"></select><label>合約名稱</label><input id="contractName"><label>服務範圍</label><textarea id="scope">門禁、對講、監視、車道停管、BA中央監控、共同天線。</textarea><div class="row"><div><label>巡檢頻率</label><input id="frequency" value="每月1次"></div><div><label>金額（未稅）</label><input id="amount" value="0"></div></div><label>合約條款</label><textarea id="terms">1. 每月一次例行巡檢保養。\n2. 耗材或零件另行報價。\n3. 保養完成後請於次月10日前付款。</textarea><div class="toolbar"><button id="saveBtn">存檔</button></div></div><div class="preview-panel" id="preview"></div></div>`);
let clients=[];function renderClientOptions(){clientSelect.innerHTML='<option value="">請選擇客戶</option>'+clients.map(c=>`<option value="${c.id}">${c.client_name}</option>`).join('')}
function renderDoc(){const c=clients.find(x=>String(x.id)===String(clientSelect.value));const amountNum=Number(amount.value||0),tax=Math.round(amountNum*0.05),total=amountNum+tax;preview.innerHTML=`<div class="doc-head"><div><h2>${COMPANY.name}</h2><div class="doc-sub">${COMPANY.tag}<br>電話：${COMPANY.phone}<br>地址：${COMPANY.address}</div></div><div class="doc-sub" style="text-align:right;"><strong style="font-size:20px;color:#111827;">維護合約單</strong><br><br>單號：${docNo.value||'＿＿＿＿'}<br>日期：${docDate.value||'＿＿＿＿'}<br>客戶：${c?.client_name||'＿＿＿＿'}</div></div><div class="block"><h3>合約名稱</h3><p>${contractName.value||'—'}</p></div><div class="block"><h3>服務範圍</h3><p>${nl2br(scope.value)||'—'}</p></div><div class="block"><h3>巡檢與金額</h3><p>頻率：${frequency.value||'—'}<br>未稅：NT$ ${money(amountNum)}<br>稅額：NT$ ${money(tax)}<br><strong>含稅總額：NT$ ${money(total)}</strong></p></div><div class="block"><h3>合約條款</h3><ol>${splitLines(terms.value).map(x=>`<li>${x.replace(/^\d+\./,'').trim()}</li>`).join('')}</ol></div>`}
async function saveDoc(){const p={doc_no:docNo.value,doc_date:docDate.value,client_id:clientSelect.value||null,contract_name:contractName.value||'',scope:scope.value||'',frequency:frequency.value||'',amount:Number(amount.value||0),terms:terms.value||''};if(!p.client_id)return alert('請先選擇客戶');if(!p.contract_name)return alert('請輸入合約名稱');if(docId.value) await API.updateContract(docId.value,p); else await API.createContract(p); alert('維護合約單已存檔')}
async function init(){clients=await API.getClients();renderClientOptions();const next=await API.nextNo('contract');docNo.value=next.doc_no;['docDate','contractName','scope','frequency','amount','terms'].forEach(id=>document.getElementById(id).addEventListener('input',renderDoc));clientSelect.onchange=renderDoc;saveBtn.onclick=saveDoc;const id=qs('id');if(id){docId.value=id;const d=await API.getContract(id);docNo.value=d.doc_no||'';docDate.value=d.doc_date||'';clientSelect.value=d.client_id?String(d.client_id):'';contractName.value=d.contract_name||'';scope.value=d.scope||'';frequency.value=d.frequency||'';amount.value=d.amount||0;terms.value=d.terms||'';}renderDoc()}init();
</script></body></html>
