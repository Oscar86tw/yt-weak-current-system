<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>設備類別｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('系統設定 / 設備類別',`<div class="split"><div class="form-panel"><h2 style="margin-top:0;">設備類別表單 <span class="badge" id="mode">新增</span></h2><input type="hidden" id="docId"><div class="row"><div><label>編號</label><input id="code" readonly></div><div><label>類別名稱</label><input id="name"></div></div><div class="toolbar"><button id="saveBtn">存檔</button><button class="light" id="clearBtn">清空</button></div></div><div class="list-panel"><div class="toolbar"><input id="search" placeholder="搜尋類別名稱"></div><div id="list"></div></div></div>`);
let rows=[];
async function load(){
  try{
    rows=await API.getEquipmentCategories();
    if(!docId.value){
      const next=await API.nextNo('equipment_category');
      code.value=next.doc_no||'0001';
    }
    render();
  }catch(err){ alert('載入設備類別失敗：'+err.message); }
}
function render(){
  const k=(search.value||'').trim().toLowerCase();
  const result=rows.filter(r=>`${r.code||''} ${r.name||''}`.toLowerCase().includes(k)||!k);
  list.innerHTML=result.length?result.map(r=>`
    <div class="list-item">
      <strong>${r.code}｜${r.name}</strong>
      <div class="toolbar">
        <button onclick="editRow(${r.id})">修改</button>
        <button class="danger" onclick="removeRow(${r.id},'${(r.code||'').replace(/'/g,"\\'")}')">刪除</button>
      </div>
    </div>`).join(''):'<div class="muted">尚無設備類別</div>';
}
function editRow(id){
  const r=rows.find(x=>x.id===id);
  if(!r) return;
  docId.value=r.id;
  code.value=r.code||'';
  name.value=r.name||'';
  mode.textContent='修改';
}
async function clearForm(){
  docId.value='';
  name.value='';
  mode.textContent='新增';
  const next=await API.nextNo('equipment_category');
  code.value=next.doc_no||'0001';
}
async function save(){
  try{
    const p={code:(code.value||'').trim(),name:(name.value||'').trim()};
    if(!p.name) return alert('請輸入類別名稱');
    if(docId.value) await API.updateEquipmentCategory(docId.value,p);
    else await API.createEquipmentCategory(p);
    await clearForm();
    await load();
    alert('設備類別已存檔');
  }catch(err){
    alert('設備類別存檔失敗：'+err.message);
  }
}
async function removeRow(id,codeText){
  try{
    if(!confirm(`確定刪除此設備類別？\n${codeText}`)) return;
    await API.deleteEquipmentCategory(id);
    await clearForm();
    await load();
  }catch(err){
    alert('刪除失敗：'+err.message);
  }
}
saveBtn.onclick=save;
clearBtn.onclick=clearForm;
search.oninput=render;
load();
</script></body></html>
