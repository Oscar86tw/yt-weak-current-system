<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>報價單查詢｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('資料建立 / 報價單 / 查詢',`
<div class="form-panel" style="margin-bottom:16px;">
  <h2 style="margin-top:0;">查詢條件</h2>
  <div class="row3">
    <div><label>關鍵字</label><input id="keyword" placeholder="單號 / 客戶 / 工程名稱"></div>
    <div><label>起始日期</label><input id="date_from" type="date"></div>
    <div><label>結束日期</label><input id="date_to" type="date"></div>
  </div>
  <div class="row3">
    <div><label>客戶</label><select id="client_id"></select></div>
    <div><label>簽核狀況</label><select id="sign_status"><option value="">全部</option><option value="尚未簽核">尚未簽核</option><option value="同意施作">同意施作</option><option value="先換待核">先換待核</option></select></div>
    <div><label>進度</label><select id="progress"><option value="">全部</option><option value="待安排">待安排</option><option value="進行中">進行中</option><option value="已完成">已完成</option></select></div>
  </div>
  <div class="row3">
    <div><label>最低金額</label><input id="total_min" type="number"></div>
    <div><label>最高金額</label><input id="total_max" type="number"></div>
    <div style="display:flex;align-items:end;gap:8px;"><button id="searchBtn">查詢</button><button class="light" id="resetBtn">重設</button><button class="light" onclick="downloadFile('/api/export/quotes')">匯出 Excel</button></div>
  </div>
</div>
<div class="kpi-grid" id="summary"></div>
<div class="list-panel"><div id="list"></div></div>`);
let rows=[], clients=[];
async function loadClients(){clients=await API.getClients(); client_id.innerHTML='<option value="">全部客戶</option>'+clients.map(c=>`<option value="${c.id}">${c.client_name}</option>`).join('')}
function groupByMonth(arr){const g={};arr.forEach(r=>{const d=((r.quote_date||'').replace(/\//g,'-').slice(0,7))||'未分類';(g[d]||(g[d]=[])).push(r);});return g;}
async function loadSummary(){const s=await API.quoteSummary();summary.innerHTML=`
  <div class="kpi"><h3>今日報價單數</h3><div class="big">${s.today_count||0}</div></div>
  <div class="kpi"><h3>本月報價單數</h3><div class="big">${s.month_count||0}</div></div>
  <div class="kpi"><h3>本月總金額</h3><div class="big">NT$ ${money(s.month_total||0)}</div></div>
  <div class="kpi"><h3>同意施作金額</h3><div class="big">NT$ ${money(s.approved_total||0)}</div></div>
  <div class="kpi"><h3>尚未簽核數</h3><div class="big">${s.unsigned_count||0}</div></div>
  <div class="kpi"><h3>待安排數</h3><div class="big">${s.pending_count||0}</div></div>`;}
function filters(){return {keyword:keyword.value,date_from:date_from.value,date_to:date_to.value,client_id:client_id.value,sign_status:sign_status.value,progress:progress.value,total_min:total_min.value,total_max:total_max.value};}
async function loadRows(){const data=await API.searchQuotes(filters()); rows=data.rows||[]; render();}
async function saveTracking(id){try{const sign=document.getElementById('sign_'+id).value;const prog=document.getElementById('prog_'+id).value;await API.updateQuoteTracking(id,{sign_status:sign,progress:prog});await loadRows();await loadSummary();}catch(err){alert('更新失敗：'+err.message);}}
function render(){if(!rows.length){list.innerHTML='<div class="muted">尚無資料</div>';return;}const groups=groupByMonth(rows);list.innerHTML=Object.keys(groups).sort().reverse().map(month=>`<div class="month-group"><div class="month-title">${month}｜${groups[month].length} 筆｜總額 NT$ ${money(groups[month].reduce((s,r)=>s+Number(r.total||0),0))}</div>${groups[month].map(r=>`
<div class="list-item">
<strong>${r.quote_no||'未編號'}｜${r.project_name||'未命名工程'}</strong>
<div>日期：${r.quote_date||'—'}　客戶：${r.client_name||'—'}　合計：NT$ ${money(r.total||0)}</div>
<div class="row">
  <div><label>簽核狀況</label><select id="sign_${r.id}"><option value="尚未簽核" ${r.sign_status==='尚未簽核'?'selected':''}>尚未簽核</option><option value="同意施作" ${r.sign_status==='同意施作'?'selected':''}>同意施作</option><option value="先換待核" ${r.sign_status==='先換待核'?'selected':''}>先換待核</option></select></div>
  <div><label>進度</label><select id="prog_${r.id}"><option value="待安排" ${r.progress==='待安排'?'selected':''}>待安排</option><option value="進行中" ${r.progress==='進行中'?'selected':''}>進行中</option><option value="已完成" ${r.progress==='已完成'?'selected':''}>已完成</option></select></div>
</div>
<div class="toolbar"><button onclick="saveTracking(${r.id})">更新追蹤</button><a class="btn" href="/quote.html?id=${r.id}">修改</a><button class="light" onclick="downloadFile('/api/quotes/${r.id}/pdf')">PDF</button><button class="light" onclick="lineSharePdf('quotes',${r.id})">LINE</button></div>
</div>`).join('')}</div>`).join('');}
function resetFilters(){['keyword','date_from','date_to','client_id','sign_status','progress','total_min','total_max'].forEach(id=>window[id].value=''); loadRows();}
searchBtn.onclick=loadRows; resetBtn.onclick=resetFilters;
(async()=>{await loadClients();await loadSummary();await loadRows();})();
</script></body></html>
