<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>報價單查詢｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('報價單查詢',`<div class="list-panel"><div class="toolbar"><input id="search" placeholder="輸入客戶 / 工程 / 報價單號查詢"></div><div id="list"></div></div>`);
let rows=[];async function load(){rows=await API.listQuotes();render()}function render(){const k=search.value.trim().toLowerCase();const result=rows.filter(r=>`${r.quote_no||''} ${r.client_name||''} ${r.project_name||''}`.toLowerCase().includes(k)||!k);list.innerHTML=result.length?result.map(r=>`<div class="list-item"><strong>${r.quote_no||'未編號'}｜${r.project_name||'未命名工程'}</strong><div>客戶：${r.client_name||'—'}</div><div>日期：${r.quote_date||'—'}</div><div>合計：NT$ ${money(r.total||0)}</div><div class="toolbar"><a class="btn" href="/quote.html?id=${r.id}">修改</a><button class="danger" onclick="removeRow(${r.id},'${(r.quote_no||'').replace(/'/g,'')}')">刪除</button></div></div>`).join(''):'<div class="muted">目前尚無報價資料。</div>'}async function removeRow(id,no){if(!confirm(`確定刪除這份報價單？\n${no}`))return;await API.deleteQuote(id);await load()}search.addEventListener('input',render);load().catch(err=>alert(err.message));
</script></body></html>
