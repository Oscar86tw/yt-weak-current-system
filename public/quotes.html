<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>報價單查詢｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('報價單查詢',`<div class="list-panel"><div class="toolbar"><input id="search" placeholder="輸入單號 / 客戶 / 工程查詢"></div><div id="list"></div></div>`);
let rows=[];function groupByMonth(arr){const g={};arr.forEach(r=>{const d=((r.quote_date||'').replaceAll('/','-').slice(0,7))||'未分類';(g[d] ||= []).push(r)});return g}
async function load(){rows=await API.listQuotes();render()}function render(){const k=search.value.trim().toLowerCase();const result=rows.filter(r=>`${r.quote_no||''} ${r.project_name||''}`.toLowerCase().includes(k)||!k);const groups=groupByMonth(result);list.innerHTML=Object.keys(groups).sort().reverse().map(month=>`<div class="list-item"><strong>${month}</strong>${groups[month].map(r=>`<div style="border-top:1px dashed #d1d5db;padding-top:10px;margin-top:10px;"><strong>${r.quote_no||'未編號'}｜${r.project_name||'未命名工程'}</strong><div>日期：${r.quote_date||'—'}　合計：NT$ ${money(r.total||0)}</div><div>簽核：${r.sign_status||'尚未簽核'}　進度：${r.progress||'待安排'}</div><div class="toolbar"><a class="btn" href="/quote.html?id=${r.id}">修改</a><button class="danger" onclick="removeRow(${r.id},'${(r.quote_no||'').replace(/'/g,'')}')">刪除</button></div></div>`).join('')}</div>`).join('')||'<div class="muted">尚無資料</div>'}async function removeRow(id,no){if(!confirm(`確定刪除這份報價單？\n${no}`))return;await API.deleteQuote(id);load()}search.oninput=render;load();
</script></body></html>
