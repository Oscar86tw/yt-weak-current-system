<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>供應商分析</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('供應商分析',`<div id="view"></div>`);
async function load(){const d=await API.getAnalysis('suppliers'); view.innerHTML=`<div class="kpi-grid"><div class="kpi"><h3>今日新增筆數</h3><div class="big">${d.count||0}</div></div>${d.total_amount!==undefined?`<div class="kpi"><h3>今日金額合計</h3><div class="big">NT$ ${money(d.total_amount||0)}</div></div>`:''}</div><div class="list-panel"><div class="month-title">今日明細</div>${(d.rows||[]).length?(d.rows||[]).map(r=>`<div class="list-item"><strong>${r.name}</strong><div>聯絡人：${r.contact_person||'—'}　電話：${r.phone||'—'}</div><div>建立時間：${(r.created_at||'').replace('T',' ').slice(0,16)}</div></div>`).join(''):'<div class="muted">今日尚無新增資料</div>'}</div>`;}
load();
</script></body></html>
