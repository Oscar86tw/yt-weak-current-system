<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>帳戶管理｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('帳戶管理',`<div class="split"><div class="form-panel"><h2 style="margin-top:0;">帳戶表單</h2><input type="hidden" id="userId"><label>帳號</label><input id="username"><label>密碼</label><input id="password" type="password"><label>權限</label><select id="role"><option value="admin">管理者</option><option value="viewer">檢視者</option></select><div class="toolbar"><button id="saveBtn">存檔</button><button class="light" id="clearBtn">清空</button></div></div><div class="list-panel"><div id="list"></div></div></div>`);
let rows=[];async function load(){rows=await API.getUsers();render()}function render(){list.innerHTML=rows.map(r=>`<div class="list-item"><strong>${r.username}</strong><div>權限：${r.role}</div><div class="toolbar"><button onclick="editRow(${r.id})">修改</button></div></div>`).join('')||'<div class="muted">尚無資料</div>'}function editRow(id){const r=rows.find(x=>x.id===id);userId.value=r.id;username.value=r.username;password.value='';role.value=r.role}function clearForm(){userId.value='';username.value='';password.value='';role.value='viewer'}async function save(){const p={username:username.value.trim(),password:password.value,role:role.value};if(!p.username)return alert('請輸入帳號');if(!userId.value&&!p.password)return alert('請輸入密碼');if(userId.value) await API.updateUser(userId.value,p); else await API.createUser(p);clearForm();load()}saveBtn.onclick=save;clearBtn.onclick=clearForm;
async function removeUser(id, username){
  try{
    if(!confirm(`確定刪除帳號【${username}】嗎？`)) return;
    await API.deleteUser(id);
    alert('帳號已刪除');
    load();
  }catch(err){
    alert('刪除帳號失敗：' + err.message);
  }
}
load();
</script></body></html>
