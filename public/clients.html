<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>客戶資料｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('客戶資料',`<div class="split"><div class="form-panel"><h2 style="margin-top:0;">客戶資料表單</h2><input type="hidden" id="docId"><label>客戶名稱</label><input id="clientName"><div class="row"><div><label>統一編號</label><input id="taxId"></div><div><label>聯絡電話</label><input id="phone"></div></div><div class="row"><div><label>聯絡人</label><input id="contact"></div><div><label>職位</label><input id="jobTitle"></div></div><label>通訊地址</label><textarea id="address"></textarea><div class="toolbar"><button id="saveBtn">存檔</button><button class="light" id="clearBtn">清空</button></div></div><div class="list-panel"><div class="toolbar"><input id="search" placeholder="搜尋客戶"></div><div id="list"></div></div></div>`);
let rows=[];async function load(){rows=await API.getClients();render()}function render(){const k=search.value.trim().toLowerCase();const result=rows.filter(r=>`${r.client_name||''} ${r.contact_person||''}`.toLowerCase().includes(k)||!k);list.innerHTML=result.map(r=>`<div class="list-item"><strong>${r.client_name}</strong><div>聯絡人：${r.contact_person||'—'}　電話：${r.phone||'—'}</div><div>地址：${r.address||'—'}</div><div class="toolbar"><button onclick="editRow(${r.id})">修改</button><button class="danger" onclick="removeRow(${r.id})">刪除</button></div></div>`).join('')||'<div class="muted">尚無資料</div>'}function editRow(id){const r=rows.find(x=>x.id===id);docId.value=r.id;clientName.value=r.client_name||'';taxId.value=r.tax_id||'';phone.value=r.phone||'';contact.value=r.contact_person||'';jobTitle.value=r.job_title||'';address.value=r.address||''}function clearForm(){['docId','clientName','taxId','phone','contact','jobTitle','address'].forEach(id=>window[id].value='')}async function save(){const p={client_name:clientName.value.trim(),tax_id:taxId.value.trim(),contact_person:contact.value.trim(),phone:phone.value.trim(),address:address.value.trim(),job_title:jobTitle.value.trim()};if(!p.client_name)return alert('請輸入客戶名稱');if(docId.value) await API.updateClient(docId.value,p); else await API.createClient(p);clearForm();load()}async function removeRow(id){if(!confirm('確定刪除此客戶資料嗎？'))return;await API.deleteClient(id);load()}saveBtn.onclick=save;clearBtn.onclick=clearForm;search.oninput=render;load();
</script></body></html>
