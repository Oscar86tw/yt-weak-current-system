<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>報價單追蹤｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('報價單追蹤',`<div class="list-panel"><div class="toolbar"><input id="search" placeholder="輸入月份 / 客戶 / 單號查詢"></div><div id="list"></div></div>`);
let rows=[];async function load(){rows=await API.listQuoteTracking();render()}function groupByMonth(data){const groups={};data.forEach(r=>{const raw=(r.quote_date||'');const key=raw?raw.replaceAll('/','-').slice(0,7):'未分類';(groups[key] ||= []).push(r)});return groups}async function updateRow(id){const sign_status=document.getElementById('sign_'+id).value;const progress=document.getElementById('prog_'+id).value;await API.updateQuoteTracking(id,{sign_status,progress});alert('追蹤狀態已更新');await load()}function render(){const k=search.value.trim().toLowerCase();const filtered=rows.filter(r=>`${r.quote_no||''} ${r.client_name||''} ${r.quote_date||''}`.toLowerCase().includes(k)||!k);const groups=groupByMonth(filtered);list.innerHTML=Object.keys(groups).sort().reverse().map(month=>`<div class="list-item"><strong>${month}</strong>${groups[month].map(r=>`<div style="border-top:1px dashed #d1d5db;padding-top:10px;margin-top:10px;"><div><strong>${r.quote_no||'未編號'}｜${r.project_name||'未命名工程'}</strong></div><div>客戶：${r.client_name||'—'}　日期：${r.quote_date||'—'}　合計：NT$ ${money(r.total||0)}</div><div class="row"><div><label>簽核狀況</label><select id="sign_${r.id}"><option value="尚未簽核" ${r.sign_status==='尚未簽核'?'selected':''}>尚未簽核</option><option value="同意施作" ${r.sign_status==='同意施作'?'selected':''}>同意施作</option><option value="先換待核" ${r.sign_status==='先換待核'?'selected':''}>先換待核</option></select></div><div><label>進度</label><select id="prog_${r.id}"><option value="待安排" ${r.progress==='待安排'?'selected':''}>待安排</option><option value="進行中" ${r.progress==='進行中'?'selected':''}>進行中</option><option value="已完成" ${r.progress==='已完成'?'selected':''}>已完成</option></select></div></div><div class="toolbar"><button onclick="updateRow(${r.id})">更新追蹤</button><a class="btn light" href="/quote.html?id=${r.id}">查看 / 修改報價單</a></div></div>`).join('')}</div>`).join('')||'<div class="muted">目前尚無報價追蹤資料。</div>'}search.addEventListener('input',render);load().catch(err=>alert(err.message));
</script></body></html>
