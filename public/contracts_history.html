<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>維護合約單查詢｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('資料建立 / 維護合約單 / 查詢',`<div class="list-panel"><div class="toolbar"><input id="search" placeholder="輸入單號 / 合約名稱 / 報價單號查詢"></div><div id="list"></div></div>`);
let rows=[];
function groupByMonth(arr){ const g={}; arr.forEach(r=>{const d=((r.doc_date||'').replace(/\//g,'-').slice(0,7))||'未分類'; (g[d]||(g[d]=[])).push(r);}); return g; }
async function load(){ try{ rows=await API.listContracts(); render(); } catch(err){ alert('載入維護合約單失敗：'+err.message); } }
function render(){
  const k=(search.value||'').trim().toLowerCase();
  const result=rows.filter(r=>`${r.doc_no||''} ${r.contract_name||''} ${r.quote_no||''}`.toLowerCase().includes(k)||!k);
  if(!result.length){ list.innerHTML='<div class="muted">尚無資料</div>'; return; }
  const groups=groupByMonth(result);
  list.innerHTML=Object.keys(groups).sort().reverse().map(month=>`<div class="month-group"><div class="month-title">${month}</div>${groups[month].map(r=>`
    <div class="list-item">
      <strong>${r.doc_no||'未編號'}｜${r.contract_name||'未命名合約'}</strong>
      <div>日期：${r.doc_date||'—'}　金額：NT$ ${money(r.amount||0)}</div>
      <div class="toolbar"><a class="btn" href="/contracts.html?id=${r.id}">修改</a><button class="danger" onclick="removeRow(${r.id},'${(r.doc_no||'').replace(/'/g,"\\'")}')">刪除</button></div>
    </div>`).join('')}</div>`).join('');
}
async function removeRow(id,no){ try{ if(!confirm(`確定刪除這份維護合約單？\n${no}`)) return; await API.deleteContract(id); await load(); } catch(err){ alert('刪除失敗：'+err.message); } }
search.oninput=render; load();
</script></body></html>
