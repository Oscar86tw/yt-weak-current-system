<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>維護合約單查詢｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
document.getElementById('app').innerHTML=shell('維護合約單查詢',`<div class="list-panel"><div class="toolbar"><input id="search" placeholder="輸入單號 / 合約名稱查詢"></div><div id="list"></div></div>`);
let rows=[];async function load(){rows=await API.listContracts();render()}function render(){const k=search.value.trim().toLowerCase();const result=rows.filter(r=>`${r.doc_no||''} ${r.contract_name||''}`.toLowerCase().includes(k)||!k);list.innerHTML=result.map(r=>`<div class="list-item"><strong>${r.doc_no||'未編號'}｜${r.contract_name||'未命名合約'}</strong><div>日期：${r.doc_date||'—'}　金額：NT$ ${money(r.amount||0)}</div><div class="toolbar"><a class="btn" href="/contracts.html?id=${r.id}">修改</a><button class="danger" onclick="removeRow(${r.id},'${(r.doc_no||'').replace(/'/g,'')}')">刪除</button></div></div>`).join('')||'<div class="muted">尚無資料</div>'}async function removeRow(id,no){if(!confirm(`確定刪除這份維護合約單？\n${no}`))return;await API.deleteContract(id);load()}search.oninput=render;load();
</script></body></html>
