<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>收據｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/forms-template.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
const state = { id: qs('id') || '' };
let quotes = [];

function collect(){
  return {
    receipt_no: receipt_no.value,
    receipt_date: receipt_date.value,
    quote_id: quote_id.value || null,
    receipt_type: receipt_type.value,
    payment_method: payment_method.value,
    payment_status: payment_status.value,
    amount_received: Number(amount_received.value || 0),
    note: note.value
  };
}

async function bindSummary(id){
  if(!id){ 
    quote_no.value=''; project_name.value=''; client_name.value=''; quote_total.value='0'; received_total_after.value='0'; remaining_balance.value='0'; 
    return; 
  }
  const s = await API.receiptSummary(id);
  quote_no.value = s.quote_no || '';
  project_name.value = s.project_name || '';
  client_name.value = s.client_name || '';
  quote_total.value = Number(s.quote_total || 0);
  const current = Number(amount_received.value || 0);
  received_total_after.value = Number(s.received_total || 0) + current;
  remaining_balance.value = Math.max(Number(s.remaining_balance || 0) - current, 0);
}

async function onAmountChange(){
  if(!quote_id.value) return;
  const s = await API.receiptSummary(quote_id.value);
  const current = Number(amount_received.value || 0);
  received_total_after.value = Number(s.received_total || 0) + current;
  remaining_balance.value = Math.max(Number(s.quote_total || 0) - Number(received_total_after.value || 0), 0);
  renderPreview();
}

function renderPreview(){
  const amount = Number(amount_received.value || 0);
  preview.innerHTML = `
    <div class="print-sheet">
      <div class="doc-title">收據（版本②｜防爭議強化版）</div>
      <div class="doc-meta">收據編號：${receipt_no.value || ''}　日期：${receipt_date.value || ''}</div>
      <table class="doc-table">
        <tr><th>報價單號</th><td>${quote_no.value || ''}</td><th>工程名稱</th><td>${project_name.value || ''}</td></tr>
        <tr><th>客戶名稱</th><td>${client_name.value || ''}</td><th>收款類型</th><td>${receipt_type.value || ''}</td></tr>
        <tr><th>收款方式</th><td>${payment_method.value || ''}</td><th>款項狀態</th><td>${payment_status.value || ''}</td></tr>
        <tr><th>報價總額</th><td>NT$ ${money(quote_total.value || 0)}</td><th>本次收款</th><td>NT$ ${money(amount)}</td></tr>
        <tr><th>累計已收</th><td>NT$ ${money(received_total_after.value || 0)}</td><th>剩餘未收</th><td>NT$ ${money(remaining_balance.value || 0)}</td></tr>
      </table>
      <div class="doc-block"><strong>備註：</strong>${note.value || '—'}</div>
      <div class="doc-block"><strong>防爭議強化條款</strong><br>
      1. 本收據僅證明本次實際收款金額。<br>
      2. 本收據所載工程內容，係依對應報價單或雙方確認內容辦理。<br>
      3. 若後續有追加、變更、減作或未列項目，仍應依實際確認內容另行計價。<br>
      4. 本收據不得視為全部工程、全部款項或全部責任均已結清之唯一依據，除非另有書面註明。<br>
      5. 收款方式、票據兌現與實際入帳狀況，仍以實際到款結果為準。
      </div>
    </div>`;
}

async function saveDoc(){
  try{
    const payload = collect();
    if(!payload.quote_id) return alert('請選擇報價單');
    if(!payload.amount_received) return alert('請輸入本次收款');
    if(state.id) await API.updateReceipt(state.id, payload);
    else {
      const r = await API.createReceipt(payload);
      state.id = r.id || '';
    }
    alert('收據已存檔');
    location.href = '/receipts.html';
  }catch(err){
    alert('收據存檔失敗：' + err.message);
  }
}

async function loadDoc(){
  quotes = await API.listQuotes();
  quote_id.innerHTML = '<option value="">請選擇報價單</option>' + quotes.map(q=>`<option value="${q.id}">${q.quote_no || ''}｜${q.project_name || ''}</option>`).join('');
  if(state.id){
    const d = await API.getReceipt(state.id);
    receipt_no.value = d.receipt_no || '';
    receipt_date.value = d.receipt_date || today();
    quote_id.value = d.quote_id ? String(d.quote_id) : '';
    receipt_type.value = d.receipt_type || '部分收款';
    payment_method.value = d.payment_method || '現金';
    payment_status.value = d.payment_status || '已收訖';
    amount_received.value = d.amount_received || 0;
    note.value = d.note || '';
    await bindSummary(quote_id.value);
  } else {
    const next = await API.nextNo('receipt');
    receipt_no.value = next.doc_no || '';
    receipt_date.value = today();
  }
  renderPreview();
}

document.getElementById('app').innerHTML = shell('資料建立 / 收據 / 新增', `
<div class="form-wrap">
  <div class="form-topbar">
    <div class="form-brand"><h1>昱拓弱電有限公司｜V3.14.6A 收據商用版</h1><p>資料建立 / 收據 / 新增</p></div>
    <div class="form-actions no-print"><button onclick="saveDoc()">存檔</button><button class="light" onclick="renderPreview()">更新預覽</button></div>
  </div>
  <div class="form-grid">
    <div class="form-panel">
      <div class="form-row"><div><label>收據編號</label><input id="receipt_no" readonly></div><div><label>收據日期</label><input id="receipt_date" type="date" oninput="renderPreview()"></div></div>
      <label>報價單</label><select id="quote_id" onchange="bindSummary(this.value); renderPreview()"></select>
      <div class="form-row"><div><label>報價單號</label><input id="quote_no" readonly></div><div><label>客戶名稱</label><input id="client_name" readonly></div></div>
      <label>工程名稱</label><input id="project_name" readonly>
      <div class="form-row-3"><div><label>收款類型</label><select id="receipt_type" onchange="renderPreview()"><option>訂金</option><option>中期款</option><option>尾款</option><option selected>部分收款</option><option>暫收款</option></select></div><div><label>收款方式</label><select id="payment_method" onchange="renderPreview()"><option>現金</option><option>匯款</option><option>支票</option><option>其他</option></select></div><div><label>款項狀態</label><select id="payment_status" onchange="renderPreview()"><option selected>已收訖</option><option>待兌現</option><option>待入帳</option></select></div></div>
      <div class="form-row-3"><div><label>報價總額</label><input id="quote_total" readonly></div><div><label>本次收款</label><input id="amount_received" type="number" oninput="onAmountChange()"></div><div><label>累計已收</label><input id="received_total_after" readonly></div></div>
      <div class="form-row"><div><label>剩餘未收</label><input id="remaining_balance" readonly></div></div>
      <label>備註</label><textarea id="note" oninput="renderPreview()"></textarea>
    </div>
    <div class="form-preview" id="preview"></div>
  </div>
</div>`);
loadDoc();
</script></body></html>
