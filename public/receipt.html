<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>收據｜昱拓弱電</title><link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/forms-template.css"></head><body><div id="app"></div><script src="/js/common.js"></script><script>
const state = { id: qs('id') || '' };
let quoteRows = [];
let receipt_no_el, receipt_date_el, quote_id_el, quote_no_el, client_name_el, project_name_el, quote_total_el, amount_received_el, payment_method_el, note_el, preview_el;

function initRefs(){
  receipt_no_el = document.getElementById('receipt_no');
  receipt_date_el = document.getElementById('receipt_date');
  quote_id_el = document.getElementById('quote_id');
  quote_no_el = document.getElementById('quote_no');
  client_name_el = document.getElementById('client_name');
  project_name_el = document.getElementById('project_name');
  quote_total_el = document.getElementById('quote_total');
  amount_received_el = document.getElementById('amount_received');
  payment_method_el = document.getElementById('payment_method');
  note_el = document.getElementById('note');
  preview_el = document.getElementById('preview');
}

function collect(){
  return {
    receipt_no: receipt_no_el.value,
    receipt_date: receipt_date_el.value,
    quote_id: quote_id_el.value || null,
    receipt_type: '部分收款',
    payment_method: payment_method_el.value,
    payment_status: '已收訖',
    amount_received: Number(amount_received_el.value || 0),
    note: note_el.value
  };
}

function resetSummary(){
  quote_no_el.value = '';
  client_name_el.value = '';
  project_name_el.value = '';
  quote_total_el.value = '0';
}

async function bindSummary(id){
  try{
    if(!id){ resetSummary(); renderPreview(); return; }

    const localRow = quoteRows.find(q => String(q.id) === String(id));
    if (localRow) {
      quote_no_el.value = localRow.quote_no || '';
      client_name_el.value = localRow.client_name || '';
      project_name_el.value = localRow.project_name || '';
      quote_total_el.value = Number(localRow.total || 0);
      renderPreview();
      return;
    }

    const s = await API.receiptSummary(id);
    quote_no_el.value = s.quote_no || '';
    client_name_el.value = s.client_name || '';
    project_name_el.value = s.project_name || '';
    quote_total_el.value = Number(s.quote_total || 0);
    renderPreview();
  }catch(err){
    resetSummary();
    alert('報價單資料帶入失敗，系統收到的是 HTML 頁面而不是 JSON，通常表示 API 路由未正確回傳資料。');
  }
}

function renderPreview(){
  preview_el.innerHTML = `
    <div class="print-sheet">
      <div class="doc-title">正 式 收 據</div>
      <div class="doc-block" style="margin-top:0;margin-bottom:12px;"><strong>昱拓弱電有限公司</strong><br>電話：0960-770-512<br>地址：桃園市中壢區榮安一街490號13樓</div>
      <div class="doc-meta">收據編號：${receipt_no_el.value || ''}　日期：${receipt_date_el.value || ''}</div>
      <table class="doc-table">
        <tr><th>報價單號</th><td>${quote_no_el.value || ''}</td><th>客戶名稱</th><td>${client_name_el.value || ''}</td></tr>
        <tr><th>工程名稱</th><td colspan="3">${project_name_el.value || ''}</td></tr>
        <tr><th>報價總額</th><td>NT$ ${money(quote_total_el.value || 0)}</td><th>本次收款</th><td>NT$ ${money(amount_received_el.value || 0)}</td></tr>
        <tr><th>收款類型</th><td>部分收款</td><th>收款方式</th><td>${payment_method_el.value || ''}</td></tr>
        <tr><th>款項狀態</th><td colspan="3">已收訖</td></tr>
      </table>
      <div class="doc-block"><strong>匯款資訊</strong><br>銀行：__________　分行：__________<br>戶名：昱拓弱電有限公司<br>帳號：________________________________</div>
      <div class="doc-block"><strong>備註：</strong>${note_el.value || '—'}</div>
      <div class="doc-block"><strong>備註條款</strong><br>
      1. 本收據僅作為本次實際收款之憑證，並以本公司實際入帳或實際受領結果為準。<br>
      2. 本收據所載工程內容、金額與收款性質，係依對應報價單、雙方確認內容或實際施工範圍辦理。<br>
      3. 如有追加工程、變更施工、減作項目、材料異動、未列項目或其他非本次收據所載事項，仍應另行確認並另行計價。<br>
      4. 除本收據另有書面註明外，本收據不得視為全部工程、全部款項、全部責任或全部保固義務均已結清、解除或完成之唯一依據。<br>
      5. 如收款方式為匯款、轉帳、支票或其他非現金方式，仍以票款兌現、款項實際入帳或本公司確認收訖為準；如未完成入帳，本收據效力僅限於收款流程記錄。<br>
      6. 客戶確認簽章後，視為已核對本收據所載內容無誤；若有疑義，應於簽收當下即提出，逾後不得以未閱覽、未核對或口頭約定主張與本收據內容不符。
      </div>
      <div class="print-signature">
        <div>公司章／收款人簽章</div>
        <div>客戶確認簽章</div>
      </div>
    </div>`;
}

async function loadQuotes(){
  quoteRows = await API.listReceiptAvailableQuotes(state.id || '');
  quote_id_el.innerHTML = '<option value="">請選擇報價單</option>' + quoteRows.map(q =>
    `<option value="${q.id}">${q.quote_no || ''}｜${q.project_name || ''}</option>`
  ).join('');
  if (!quoteRows.length && !state.id) {
    quote_id_el.innerHTML = '<option value="">目前沒有可開立收據的報價單</option>';
  }
}

async function saveDoc(){
  try{
    const payload = collect();
    if(!payload.quote_id) return alert('請先選擇報價單');
    if(!payload.amount_received) return alert('請輸入本次收款金額');
    if(state.id) await API.updateReceipt(state.id, payload);
    else {
      const r = await API.createReceipt(payload);
      state.id = r.id || '';
    }
    alert('收據已存檔');
    location.href = '/receipts.html';
  }catch(err){
    const msg = String(err.message || '');
    if (msg.includes('quote_already_has_receipt')) return alert('此報價單已開立過收據，為避免重覆項目，請改選其他報價單。');
    if (msg.includes('amount_exceeds_quote_total')) return alert('本次收款不可大於報價總額。');
    if (msg.includes('amount_required')) return alert('請輸入有效收款金額。');
    alert('收據存檔失敗：' + err.message);
  }
}

async function loadDoc(){
  await loadQuotes();
  if(state.id){
    const d = await API.getReceipt(state.id);
    receipt_no_el.value = d.receipt_no || '';
    receipt_date_el.value = d.receipt_date || today();
    quote_id_el.value = d.quote_id ? String(d.quote_id) : '';
    payment_method_el.value = d.payment_method || '現金';
    amount_received_el.value = d.amount_received || 0;
    note_el.value = d.note || '';
    await bindSummary(quote_id_el.value);
  } else {
    const next = await API.nextNo('receipt');
    receipt_no_el.value = next.doc_no || '';
    receipt_date_el.value = today();
    payment_method_el.value = '現金';
    resetSummary();
    renderPreview();
  }
}

document.getElementById('app').innerHTML = shell('資料建立 / 收據 / 新增', `
<div class="form-wrap">
  <div class="form-topbar">
    <div class="form-brand"><h1>昱拓弱電有限公司｜V3.14.6A 收據帶值修正版</h1><p>資料建立 / 收據 / 新增</p></div>
    <div class="form-actions no-print"><button onclick="saveDoc()">存檔</button><button class="light" onclick="renderPreview()">更新預覽</button><button class="light" onclick="window.print()">列印正式版</button></div>
  </div>
  <div class="form-grid">
    <div class="form-panel">
      <div class="form-row"><div><label>收據編號</label><input id="receipt_no" readonly></div><div><label>收據日期</label><input id="receipt_date" type="date" oninput="renderPreview()"></div></div>
      <label>報價單下拉選單</label><select id="quote_id" onchange="bindSummary(this.value)"></select>
      <div class="hint" style="margin:8px 0 14px;">點選報價單後，下面欄位會自動連動帶入報價單號、客戶名稱、工程名稱與報價總額。</div>

      <div class="form-row">
        <div><label>報價單號</label><input id="quote_no" readonly style="background:#f5f7fb;"></div>
        <div><label>客戶名稱</label><input id="client_name" readonly style="background:#f5f7fb;"></div>
      </div>

      <label>工程名稱</label><input id="project_name" readonly style="background:#f5f7fb;">

      <div class="form-row">
        <div><label>報價總額</label><input id="quote_total" readonly style="background:#f5f7fb;"></div>
        <div><label>本次收款</label><input id="amount_received" type="number" placeholder="這張收據實際收到的金額" oninput="renderPreview()"></div>
      </div>

      <div class="form-row">
        <div><label>確認方式（收款方式）</label><select id="payment_method" onchange="renderPreview()"><option>現金</option><option>匯款</option><option>支票</option><option>其他</option></select></div>
        <div><label>款項狀態</label><input value="已收訖" readonly style="background:#f5f7fb;"></div>
      </div>

      <label>備註</label><textarea id="note" oninput="renderPreview()"></textarea>
      <div class="hint" style="margin-top:10px;">已開立收據的報價單，下一張收據將不再顯示，避免重覆項目。你只需選擇報價單、填入本次收款金額，再確認收款方式即可。</div>
    </div>
    <div class="form-preview" id="preview"></div>
  </div>
</div>`);

initRefs();
loadDoc();
</script></body></html>
